            <h5 className={`text-[10px] uppercase font-bold tracking-widest mb-3 flex items-center gap-2 ${typeLabelClass}`}>
              <div className="h-px flex-1 bg-current opacity-20"></div>
              {typeName}
              <div className="h-px flex-1 bg-current opacity-20"></div>
            </h5>
            <div className={`${isArabic ? 'pr-4 border-r-[3px]' : 'pl-4 border-l-[3px]'} space-y-3 ${sideBorderClass}`}>
              {sections.map((section, idx) => {
                let bgClass = "bg-islamic-900/40 hover:bg-islamic-900/60";
                let borderClass = "border-islamic-gold/10 hover:border-islamic-gold/30";
                let iconBgClass = "bg-islamic-800/80 border-islamic-gold/20 text-islamic-gold";
                let titleClass = "text-emerald-400";

                if (section.type === 'homework') {
                  bgClass = "bg-amber-900/10 hover:bg-amber-900/20";
                  borderClass = "border-amber-500/20 hover:border-amber-500/40";
                  iconBgClass = "bg-amber-900/40 border-amber-500/30 text-amber-500";
                  titleClass = "text-amber-500";
                } else if (section.type === 'feedback') {
                  bgClass = "bg-blue-900/10 hover:bg-blue-900/20";
                  borderClass = "border-blue-500/20 hover:border-blue-500/40";
                  iconBgClass = "bg-blue-900/50 border-blue-500/30 text-blue-400";
                  titleClass = "text-blue-400";
                } else if (section.type === 'tajweed') {
                  bgClass = "bg-teal-900/20 hover:bg-teal-900/30";
                  borderClass = "border-teal-500/30 hover:border-teal-400/50";
                  iconBgClass = "bg-teal-900/50 border-teal-400/40 text-teal-300";
                  titleClass = "text-teal-300";
                }

                return (
                  <div key={idx} className={`relative rounded-2xl p-4 flex gap-4 transition-transform hover:translate-x-1 duration-300 border ${bgClass} ${borderClass}`}>
                    <div className={`flex-shrink-0 w-8 h-8 rounded-full border flex items-center justify-center shadow-inner mt-0.5 ${iconBgClass}`}>
                      <i data-lucide={section.icon} className="w-4 h-4"></i>
                    </div>
                    <div className="flex-1 pr-4">
                      {(() => {
                        const isTitleArabic = /[\u0600-\u06FF]/.test(section.title);
                        return (
                          <h4
                            className={`font-bold mb-1 ${isTitleArabic ? 'font-amiri text-lg text-right' : 'text-[13px] uppercase tracking-widest'} ${titleClass}`}
                            dir={isTitleArabic ? 'rtl' : 'ltr'}
                          >
                            {section.title}
                          </h4>
                        );
                      })()}
                      {(() => {
                        const isContentArabic = /[\u0600-\u06FF]/.test(section.content);
                        return (
                          <div
                            className={`text-slate-200 text-sm whitespace-pre-wrap leading-loose mt-1 ${isContentArabic ? 'font-amiri text-base text-right' : 'font-sans'}`}
                            dir={isContentArabic ? 'rtl' : 'ltr'}
                          >
                            {section.content || <span className="opacity-40 italic">{t.noDetails}</span>}
                          </div>
                        );
                      })()}
                      {options.showQuizAction && (
                        <button
                          onClick={() => options.onOpenQuiz && options.onOpenQuiz(section)}
                          className="mt-3 inline-flex items-center gap-1.5 rounded-lg border border-teal-400/40 bg-teal-500/20 px-3 py-1.5 text-xs font-bold text-teal-200 hover:bg-teal-500/30 transition-colors"
                        >
                          <i data-lucide="play-circle" className="w-3.5 h-3.5"></i>
                          {t.openQuiz}
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      return (
        <div className={`max-w-4xl mx-auto p-4 md:p-8 pb-20 relative ${(student.zoomLink || scheduleLink || student.scheduleMessage) ? 'pt-[160px] md:pt-36' : ''} ${fontClass}`} dir={isArabic ? 'rtl' : 'ltr'}>
          {/* Sticky Top Bar for Actions & Schedule Title */}
          {(student.zoomLink || scheduleLink || student.scheduleMessage) && (
            <div id="tour-actions" className={`fixed top-0 left-0 right-0 z-40 bg-islamic-900/80 backdrop-blur-md border-b border-islamic-gold/20 shadow-lg animate-fade-down ${fontClass}`} dir={isArabic ? 'rtl' : 'ltr'}>
              <div className="max-w-4xl mx-auto px-4 py-3 flex flex-col sm:flex-row gap-3 sm:gap-4 items-center justify-between">

                {/* Action Buttons Group */}
                <div className={`flex gap-3 shrink-0 order-2 sm:order-1 ${!student.scheduleMessage ? 'w-full' : 'w-full sm:w-auto'}`}>
                  {student.zoomLink && (
                    <a id="tour-join-class" href={student.zoomLink} target="_blank" rel="noopener noreferrer" className={`flex-1 sm:flex-none px-4 flex items-center justify-center gap-2 bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 text-emerald-400 py-2.5 rounded-xl transition-all active:scale-95 shadow-inner`}>
                      <svg viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4 md:w-5 md:h-5 shrink-0">
                        <path d="M16.033 9.07v5.86c0 .825-.675 1.5-1.5 1.5H3.5c-.825 0-1.5-.675-1.5-1.5v-5.86c0-.825.675-1.5 1.5-1.5h11.033c.825 0 1.5.675 1.5 1.5zm6.467-1.396-4.667 3.5v1.652l4.667 3.5c.367.275.833.013.833-.45V8.125c0-.463-.466-.725-.833-.45z" />
                      </svg>
                      <span className={`font-bold whitespace-nowrap tracking-wider ${isArabic ? 'text-sm' : 'text-[11px] md:text-sm uppercase'}`}>{t.joinClass}</span>
                    </a>
                  )}
                  {scheduleLink && (
                    <a id="tour-book-session" href={scheduleLink} target="_blank" rel="noopener noreferrer" className={`flex-1 sm:flex-none px-4 flex items-center justify-center gap-2 bg-amber-500/20 hover:bg-amber-500/30 border border-amber-500/30 text-amber-400 py-2.5 rounded-xl transition-all active:scale-95 shadow-inner`}>
                      <i data-lucide="calendar-plus" className="w-4 h-4 md:w-5 md:h-5 shrink-0"></i>
                      <span className={`font-bold whitespace-nowrap tracking-wider ${isArabic ? 'text-sm' : 'text-[11px] md:text-sm uppercase'}`}>{t.scheduleClass}</span>
                    </a>
                  )}
                </div>

                {/* Schedule Toggle Button */}
                {student.scheduleMessage && (
                  <button 
                    id="tour-my-schedule"
                    onClick={() => setShowSchedule(true)} 
                    className={`shrink-0 w-full sm:w-auto flex items-center justify-center gap-2 bg-islamic-800/50 hover:bg-islamic-800 border border-islamic-gold/30 text-islamic-light py-2.5 px-5 rounded-xl transition-all shadow-inner active:scale-95 order-1 sm:order-2`}
                  >
                    <i data-lucide="clock" className="w-4 h-4 md:w-5 md:h-5 shrink-0 text-islamic-gold"></i>
                    <span className={`font-bold whitespace-nowrap tracking-wider ${isArabic ? 'text-sm' : 'text-[11px] md:text-sm uppercase'}`}>
                      {t.scheduleTitle}
                    </span>
                  </button>
                )}

              </div>
            </div>
          )}
          <style dangerouslySetInnerHTML={{
            __html: `
            .driver-rtl {
              direction: rtl !important;
              font-family: 'Amiri', serif !important;
            }
            .driver-rtl .driver-popover-title,
            .driver-rtl .driver-popover-description {
              text-align: right !important;
            }
            .driver-rtl .driver-popover-footer {
              flex-direction: row-reverse !important;
              justify-content: flex-start !important;
            }
            .driver-rtl .driver-popover-progress-text {
              display: none !important;
            }
            .driver-rtl .driver-popover-navigation-btns {
              display: flex !important;
              flex-direction: row-reverse !important;
              gap: 0.5rem !important;
            }
          `}} />

          <FloatingHelpButton />
          <InstallPrompt />

          {/* Header Section */}
          <div id="tour-header" className="glass-panel rounded-3xl p-8 mb-8 text-center relative overflow-hidden animate-fade">
            <div className="absolute top-0 right-0 w-64 h-64 bg-islamic-gold/10 rounded-full blur-3xl -mx-20 -my-20 pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>

            <i data-lucide="book-open" className="w-12 h-12 text-islamic-gold mx-auto mb-4 opacity-80"></i>
            <h1 className={`text-4xl md:text-5xl font-bold text-white ${headerFontClass}`}>
              {student.name}
            </h1>
          </div>

          {/* Current Month Box Above Calendar - with month navigation */}
          <div id="tour-month" className={`glass-panel rounded-2xl p-4 md:p-6 mb-4 flex items-center ${isTourMode ? 'justify-center' : 'justify-between'} animate-fade delay-1`}>

            {!isTourMode && (
              <button onClick={goPrev} disabled={!canGoPrev} className={prevBtnClass} title={isArabic ? 'الشهر السابق' : 'Previous Month'}>
                <i data-lucide={isArabic ? 'chevron-right' : 'chevron-left'} className="w-5 h-5"></i>
              </button>
            )}

            <div className="flex flex-col items-center gap-1">
              <h2 className={`text-2xl font-bold text-islamic-light flex items-center gap-3 ${headerFontClass}`}>
                <i data-lucide="calendar-days" className="w-6 h-6 text-islamic-gold"></i>
                {currentMonthNames[effectiveMonth]} {toArabicNums(effectiveYear)}
              </h2>
              {!isTourMode && canGoNext && <span className="text-xs text-slate-400 tracking-wider">{isArabic ? 'شهر سابق' : 'Previous Month'}</span>}
            </div>

            {!isTourMode && (
              <button onClick={goNext} disabled={!canGoNext} className={nextBtnClass} title={isArabic ? 'الشهر التالي' : 'Next Month'}>
                <i data-lucide={isArabic ? 'chevron-left' : 'chevron-right'} className="w-5 h-5"></i>
              </button>
            )}

          </div>

          {/* Schedule Message moved to Sticky Top Bar */}

          {/* Calendar Section */}
          <div id="tour-calendar" className="glass-panel rounded-3xl p-6 md:p-8 animate-fade delay-[500ms] mb-8">
            <h2 className={`text-xl md:text-2xl font-semibold mb-6 text-center text-white flex items-center justify-center gap-3 ${headerFontClass}`}>
              {t.monthlySchedule}
            </h2>

            <div className="grid grid-cols-7 gap-2 md:gap-4 mb-2">
              {currentWeekDays.map(day => (
                <div key={day} className={`text-center font-bold text-slate-400 text-sm py-2 ${headerFontClass}`}>
                  {day}
                </div>
              ))}
            </div>

            <div className="grid grid-cols-7 gap-2 md:gap-4 overflow-visible">
              {paddingDays.map((_, i) => <div key={`pad-${i}`}></div>)}
              {monthDays.map(day => renderDay(day))}
            </div>

            <div className="mt-6 md:mt-8 flex justify-center gap-2 sm:gap-4 md:gap-6 text-[10px] md:text-sm text-slate-500/70 whitespace-nowrap overflow-x-auto no-scrollbar pb-1 w-full" style={{ scrollbarWidth: 'none' }}>
              <div className="flex items-center justify-center gap-1 md:gap-2">
                <div className="w-2 h-2 md:w-3 md:h-3 rounded-full bg-emerald-400/80"></div> <span>{t.present}</span>
              </div>
              <div className="flex items-center justify-center gap-1 md:gap-2">
                <div className="w-2 h-2 md:w-3 md:h-3 rounded-full bg-red-400/80"></div> <span>{t.absent}</span>
              </div>
              <div className="flex items-center justify-center gap-1 md:gap-2">
                <div className="w-2 h-2 md:w-3 md:h-3 rounded-full bg-amber-400/80"></div> <span>{t.compensated}</span>
              </div>
              <div className="flex items-center justify-center gap-1 md:gap-2">
                <div className="w-2.5 h-2.5 md:w-4 md:h-4 rounded-full border border-dashed border-islamic-gold/40"></div>
                <span>{t.scheduled}</span>
              </div>
              <div className="flex items-center justify-center gap-1 md:gap-2">
                <div className="w-2.5 h-2.5 md:w-4 md:h-4 rounded-full bg-islamic-gold/80 text-islamic-900 flex items-center justify-center"><i data-lucide="file-text" className="w-[8px] h-[8px] md:w-2.5 md:h-2.5"></i></div>
                <span className="hidden sm:inline">{t.reportAvailable}</span><span className="inline sm:hidden">{isArabic ? 'تقرير' : 'Report'}</span>
              </div>
            </div>
          </div>

          <div id="tour-stats" className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            {/* Attendance Stat */}
            <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center animate-fade delay-2 relative overflow-hidden">
              <div className="absolute inset-0 bg-gradient-to-br from-emerald-500/10 to-transparent"></div>
              <p className={`text-slate-400 tracking-widest mb-1 z-10 ${isArabic ? 'text-base font-bold' : 'text-sm uppercase'}`}>{t.classesAttended}</p>
              <h3 className={`text-5xl font-light text-emerald-400 z-10 ${isArabic ? 'font-sans' : ''}`}>{toArabicNums(presentCount)}</h3>
            </div>

            {/* Absences Stat */}
            <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center animate-fade delay-[400ms] relative overflow-hidden">
              <div className="absolute inset-0 bg-gradient-to-br from-red-500/5 to-transparent"></div>
              <p className={`text-slate-400 tracking-widest mb-1 z-10 ${isArabic ? 'text-base font-bold' : 'text-sm uppercase'}`}>{t.missedClasses}</p>
              <h3 className={`text-5xl font-light text-red-400 z-10 ${isArabic ? 'font-sans' : ''}`}>{toArabicNums(absentCount)}</h3>
            </div>
          </div>

          {/* Action Links (Moved to Top Sticky Bar) */}

          {/* Schedule Modal */}
          {showSchedule && student.scheduleMessage && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade">
              <div className="glass-panel w-full max-w-sm rounded-3xl p-6 relative border border-islamic-gold/30 shadow-[0_0_30px_rgba(217,119,6,0.1)]">
                <button
                  onClick={() => setShowSchedule(false)}
                  className={`absolute top-3 ${isArabic ? 'left-3' : 'right-3'} text-slate-400 hover:text-white transition-colors z-[100] bg-slate-900/50 hover:bg-slate-800 rounded-full w-10 h-10 flex items-center justify-center shadow-lg`}
                >
                  <i data-lucide="x" className="w-5 h-5"></i>
                </button>
                
                <div className="text-center mb-6">
                  <div className="inline-flex items-center justify-center w-14 h-14 rounded-full bg-islamic-800/80 text-islamic-gold mb-4 border border-islamic-gold/30 shadow-[0_0_15px_rgba(217,119,6,0.3)]">
                    <i data-lucide="clock" className="w-7 h-7"></i>
                  </div>
                  <h3 className={`text-xl font-bold text-islamic-light ${headerFontClass}`}>
                    {t.scheduleTitle}
                  </h3>
                </div>

                <div className="space-y-3 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2 text-slate-200 text-sm md:text-base leading-loose" dir="ltr">
                  {(() => {
                    let lines = student.scheduleMessage.split('\n');
                    
                    let title = "";
                    let timezone = "";
                    let timeLines = lines;

                    if (lines.length > 0 && lines[0].includes('\uD83D\uDD52')) {
                      title = lines[0];
                      if (lines.length > 1 && !lines[1].includes('\uD83D\uDD39')) {
                        timezone = lines[1];
                        timeLines = lines.slice(2);
                      } else {
                        timeLines = lines.slice(1);
                      }
                    }

                    // Day order mapping (0=Sun,1=Mon...6=Sat)
                    const dayOrderEn = { 'monday':1,'tuesday':2,'wednesday':3,'thursday':4,'friday':5,'saturday':6,'sunday':0 };
                    const dayOrderAr = { 'الأحد':0,'الاثنين':1,'الثلاثاء':2,'الأربعاء':3,'الخميس':4,'الجمعة':5,'السبت':6 };

                    // Parse valid schedule lines
                    const scheduleEntries = timeLines
                      .filter(l => l.trim() !== '' && l.includes('\uD83D\uDD39'))
                      .map(line => {
                        const parts = line.split(/\*([^*]+)\*/g);
                        // Extract day name from line
                        const boldParts = [];
                        parts.forEach((p, i) => { if (i % 2 === 1) boldParts.push(p.trim()); });
                        const dayName = boldParts[0] || '';
                        const timePart = boldParts[1] || '';
                        // Determine sort order
                        const lc = dayName.toLowerCase();
                        let order = isArabic ? (dayOrderAr[dayName] ?? 99) : (dayOrderEn[lc] ?? 99);
                        return { line, dayName, timePart, order };
                      });

                    // Sort: Monday-first for English, Sunday-first for Arabic
                    const sorted = !isArabic
                      ? [...scheduleEntries].sort((a, b) => {
                          // Reorder so Monday(1) is first
                          const mo = (n) => n === 0 ? 7 : n;
                          return mo(a.order) - mo(b.order);
                        })
                      : scheduleEntries;

                    // Find next upcoming class — 15min grace period, then skip to next scheduled class day
                    const now = new Date(); void tick; // tick forces re-render every minute
                    const todayDow = now.getDay();
                    const nowMinutes = now.getHours() * 60 + now.getMinutes();

                    // Helper: parse "08:00 PM", "07:30 م", or "20:00" → minutes since midnight
                    const parseTimeToMinutes = (timeStr) => {
                      if (!timeStr) return -1;
                      
                      // Convert Arabic numerals to English numerals
                      const arabicNumbers = [ /٠/g, /١/g, /٢/g, /٣/g, /٤/g, /٥/g, /٦/g, /٧/g, /٨/g, /٩/g ];
                      let clean = timeStr.trim();
                      for (let i = 0; i < 10; i++) {
                        clean = clean.replace(arabicNumbers[i], i);
                      }
                      
                      clean = clean.toUpperCase();
                      
                      // Match 12-hour format with AM/PM or ص/م
                      const m12 = clean.match(/(\d{1,2}):(\d{2})\s*(AM|PM|ص|م)/i);
                      if (m12) {
                        let h = parseInt(m12[1]);
                        const m = parseInt(m12[2]);
                        const ampm = m12[3];
                        
                        if ((ampm === 'PM' || ampm === 'م') && h !== 12) h += 12;
                        if ((ampm === 'AM' || ampm === 'ص') && h === 12) h = 0;
                        return h * 60 + m;
                      }
                      
                      const m24 = clean.match(/(\d{1,2}):(\d{2})/);
                      if (m24) return parseInt(m24[1]) * 60 + parseInt(m24[2]);
                      return -1;
                    };

                    // Compute daysUntil for each entry
                    const withNextOccurrence = scheduleEntries.map(entry => {
                      const classMin = parseTimeToMinutes(entry.timePart);
                      let daysUntil;
                      if (entry.order === todayDow) {
                        // today: if within 15min grace → still today; else skip to next occurrence of this day (7 days)
                        // But we don't hardcode 7 — we only assign 7 so other days with lower daysUntil win naturally
                        daysUntil = (classMin < 0 || nowMinutes <= classMin + 15) ? 0 : 7;
                      } else {
                        daysUntil = (entry.order - todayDow + 7) % 7;
                      }
                      return { ...entry, classMin, daysUntil };
                    });

                    const minDays = Math.min(...withNextOccurrence.map(e => e.daysUntil));
                    const nextEntry = withNextOccurrence.find(e => e.daysUntil === minDays);
                    const nextClassDow = nextEntry?.order ?? -1;

                    // Build countdown label for next class
                    const buildCountdown = (entry) => {
                      const classMin = entry?.classMin ?? -1;
                      if (classMin < 0) return null;
                      const diff = classMin - nowMinutes; // negative = past
                      if (entry.daysUntil > 0) {
                        // future day
                        const totalMins = entry.daysUntil * 24 * 60 + classMin - nowMinutes;
                        const hh = Math.floor(totalMins / 60);
                        const mm = totalMins % 60;
                        if (hh >= 24) {
                          const dd = Math.floor(hh / 24);
                          const rh = hh % 24;
                          return isArabic
                            ? `بعد ${dd}ي ${rh > 0 ? rh + 'س' : ''}`
                            : `in ${dd}d ${rh > 0 ? rh + 'h' : ''}`;
                        }
                        return isArabic ? `بعد ${hh}س ${mm}د` : `in ${hh}h ${mm}m`;
                      } else if (diff >= 0) {
                        // upcoming today
                        const hh = Math.floor(diff / 60);
                        const mm = diff % 60;
                        if (hh > 0) return isArabic ? `بعد ${hh}س ${mm}د` : `in ${hh}h ${mm}m`;
                        return isArabic ? `بعد ${mm} دقيقة` : `in ${mm}m`;
                      } else {
                        // past today (within grace)
                        const elapsed = Math.abs(diff);
                        return isArabic ? `منذ ${elapsed} دقيقة` : `${elapsed}m ago`;
                      }
                    };

                    const countdownLabel = toArabicNums(buildCountdown(nextEntry));

                    return (
                      <div className="flex flex-col gap-3">
                        <div className="flex flex-col gap-2">
                        {sorted.map(({ line, order, dayName, timePart, classMin, daysUntil }, idx) => {
                          const isNext = order === nextClassDow && withNextOccurrence.find(e => e.order === order)?.daysUntil === minDays;
                          const parts = line.split(/\*([^*]+)\*/g);
                          if (line.trim() === '') return null;
                          return (
                            <div key={idx} className={`flex flex-col p-3 rounded-xl border transition-all duration-500 ${
                              isNext
                                ? 'bg-islamic-gold/15 border-islamic-gold/50 animate-next-glow'
                                : 'bg-white/5 border-white/10 hover:bg-white/10'
                            }`} dir={isArabic ? 'rtl' : 'ltr'}>
                              {/* Day + Arrow + Time — always one line */}
                              <div className="flex items-center gap-1 whitespace-nowrap overflow-hidden">
                              {parts.map((part, i) => {
                                if (i % 2 === 1) {
                                  const isTime = part.includes('PM') || part.includes('AM') || part.includes('ص') || part.includes('م') || part.match(/[\d\u0660-\u0669]/);
                                  return <strong key={i} className={`text-islamic-light shrink-0 ${isNext ? 'text-lg' : ''} ${isTime ? `font-sans tracking-wide ${isNext ? 'text-islamic-gold' : 'text-emerald-400'}` : ''}`}>{part}</strong>;
                                } else {
                                  let text = part.replace('\uD83D\uDD39', '').trim();
                                  if (text.includes('->')) {
                                    return (
                                      <span key={i} className="text-islamic-gold/60 px-2 font-bold opacity-80 shrink-0">
                                        {isArabic ? '\u2190' : '\u2192'}
                                      </span>
                                    );
                                  }
                                  return <span key={i} className={`opacity-60 shrink-0 ${isNext ? 'text-islamic-gold/80' : 'text-slate-300'}`}>{text}</span>;
                                }
                              })}
                              </div>
                              {/* Countdown badge — separate line */}
                              {isNext && countdownLabel && (
                                <div className="mt-1.5">
                                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${
                                    countdownLabel.includes('ago') || countdownLabel.includes('منذ')
                                      ? 'bg-red-500/20 text-red-300 border border-red-500/30'
                                      : 'bg-islamic-gold/20 text-islamic-gold border border-islamic-gold/30'
                                  }`}>{countdownLabel}</span>
                                </div>
                              )}
                            </div>
                          );
                        })}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* Report Modal */}
          {selectedReport && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div id="tour-report-modal-content" className="glass-panel w-full max-w-lg rounded-3xl p-4 md:p-6 relative animate-fade border border-islamic-gold/30 shadow-[0_0_30px_rgba(217,119,6,0.1)]">
                <div className="absolute top-0 right-0 w-32 h-32 bg-islamic-gold/10 rounded-bl-full z-0 pointer-events-none blur-xl"></div>
                <button
                  onClick={() => setSelectedReport(null)}
                  className={`absolute top-3 ${isArabic ? 'left-3' : 'right-3'} text-slate-400 hover:text-white transition-colors z-[100] bg-slate-900/50 hover:bg-slate-800 rounded-full w-10 h-10 flex items-center justify-center shadow-lg`}
                >
                  <i data-lucide="x" className="w-5 h-5"></i>
                </button>

                <div className="relative z-10 text-center mb-3 md:mb-6">
                  <div className="hidden md:inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-500/20 text-emerald-400 mb-3 border border-emerald-500/30 shadow-[0_0_15px_rgba(52,211,153,0.3)]">
                    <i data-lucide="award" className="w-6 h-6"></i>
                  </div>
                  <h3 className={`text-base md:text-2xl font-bold text-islamic-light border-b border-islamic-gold/20 pb-2 md:pb-4 ${headerFontClass}`}>
                    {t.dailyReport}
                  </h3>
                  <p className="text-xs md:text-sm text-emerald-200 mt-1 md:mt-2">
                    {isArabic
                      ? `${toArabicNums(selectedReport.day)} ${currentMonthNames[month]} ${toArabicNums(year)}`
                      : `${currentMonthNames[month]} ${selectedReport.day}, ${year}`}
                  </p>
                </div>

                <div className="space-y-2 max-h-[65vh] md:max-h-[55vh] overflow-y-auto custom-scrollbar pr-2 relative z-10 pb-4">
                  {(() => {
                    const parsed = parseReport(selectedReport.text);
                    // Filter out any accidentally lingering 'Summary' just in case
                    const validSections = parsed.filter(s => s.title !== 'Summary');

                    const classwork = validSections.filter(s => s.type === 'classwork');
                    const tajweed = validSections.filter(s => s.type === 'tajweed');
                    const homework = validSections.filter(s => s.type === 'homework');
                    const feedback = validSections.filter(s => s.type === 'feedback');
                    const other = validSections.filter(s => s.type === 'other');
                    const audio = validSections.filter(s => s.type === 'audio');

                    return (
                      <>
                        {renderSectionGroup(classwork, "text-emerald-500/70", "border-emerald-500/40", t.completedInClass, isTourMode ? "tour-completed" : undefined)}
                        {renderSectionGroup(homework, "text-amber-500/70", "border-amber-500/40", t.homeworkNextClass, isTourMode ? "tour-homework" : undefined)}
                        {renderSectionGroup(
                          tajweed,
                          "text-teal-300/80",
                          "border-teal-400/40",
                          t.tajweedSection,
                          undefined,
                          { showQuizAction: true, onOpenQuiz: openTajweedQuizFromSection }
                        )}
                        {renderSectionGroup(feedback, "text-blue-400/70", "border-blue-500/40", t.feedbackNotes, isTourMode ? "tour-feedback" : undefined)}
                        {renderSectionGroup(other, "text-slate-400/50", "border-slate-500/30", t.otherDetails)}
                        {audio.length > 0 && (
                          <div id={isTourMode ? "tour-audio" : undefined} className="mt-4 pt-4 border-t border-islamic-gold/10">
                            <h5 className="text-[10px] uppercase font-bold tracking-widest mb-3 flex items-center gap-2 text-slate-400/60">
                              <div className="h-px flex-1 bg-current opacity-20"></div>
                              {t.audio}
                              <div className="h-px flex-1 bg-current opacity-20"></div>
                            </h5>
                            <div className="space-y-2">
                              {audio.map((s, idx) => {
                                const url = s.content?.trim();
                                const label = s.title.replace(/🎧/g, '').trim();
                                return url ? (
                                  <a
                                    key={idx}
                                    href={url}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="flex items-center gap-3 p-3 rounded-2xl bg-slate-800/50 border border-slate-600/20 hover:border-islamic-gold/40 hover:bg-slate-700/40 transition-all duration-300 group"
                                  >
                                    <div className="relative w-9 h-9 flex-shrink-0">
                                      <div className="absolute inset-0 rounded-full bg-islamic-gold/25 animate-ping group-hover:animate-none"></div>
                                      <div className="relative w-full h-full rounded-full bg-islamic-gold/10 border border-islamic-gold/20 flex items-center justify-center text-islamic-gold group-hover:bg-islamic-gold/20 transition-colors">
                                        <i data-lucide="headphones" className="w-4 h-4"></i>
                                      </div>
                                    </div>
                                    <div className="flex-1 min-w-0">
                                      <p className="text-xs text-slate-300 font-medium group-hover:text-white transition-colors">{label || t.audioRecording}</p>
                                    </div>
                                    <i data-lucide="external-link" className="w-4 h-4 text-slate-500 group-hover:text-islamic-gold transition-colors flex-shrink-0"></i>
                                  </a>
                                ) : null;
                              })}
                            </div>
                          </div>
                        )}
                      </>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* Tajweed Learning Roadmap Page */}
          {selectedTajweedQuiz && showTajweedRoadmapPage && !selectedTajweedQuiz.missing && (
            <div className="fixed inset-0 bg-slate-900/55 backdrop-blur-sm z-[70] flex items-center justify-center p-4 md:p-5">
              <div className="glass-panel w-full max-w-5xl h-[82dvh] md:h-[92vh] rounded-3xl p-4 md:p-6 relative animate-fade border border-islamic-gold/30 shadow-[0_0_30px_rgba(217,119,6,0.1)] flex flex-col">
                <button
                  onClick={closeTajweedQuiz}
                  className={`absolute top-3 ${isArabic ? 'left-3' : 'right-3'} text-slate-300 hover:text-white transition-colors z-[100] bg-islamic-900/55 hover:bg-islamic-800 rounded-full w-10 h-10 flex items-center justify-center shadow-lg border border-islamic-gold/20`}
                >
                  <i data-lucide="x" className="w-5 h-5"></i>
                </button>

                <div className="text-center mb-4 md:mb-5 pr-9 md:pr-0">
                  <div className="inline-flex items-center justify-center w-12 h-12 rounded-full bg-islamic-800/80 text-islamic-gold mb-2 border border-islamic-gold/30">
                    <i data-lucide="map" className="w-5 h-5"></i>
                  </div>
                  <h3 className={`text-xl md:text-2xl font-bold text-islamic-gold ${headerFontClass}`}>{t.learningRoadmapTitle}</h3>
                  <p className="text-xs md:text-sm text-slate-200/90 mt-2">{t.learningRoadmapPageIntro}</p>
                </div>

                {roadmapAutoStartEnabled && roadmapAutoStartCountdown > 0 && (Array.isArray(selectedTajweedQuiz?.questions) ? selectedTajweedQuiz.questions : []).length > 0 && (
                  <div className="mb-3 rounded-xl border border-teal-300/30 bg-teal-500/10 px-3 py-2 animate-pulse">
                    <p className="text-xs md:text-sm font-bold text-teal-100">
                      {isArabic
                        ? `${t.autoStartQuizIn} ${toArabicNums(roadmapAutoStartCountdown)} ث`
                        : `${t.autoStartQuizIn} ${roadmapAutoStartCountdown}s`}
                    </p>
                    <div className="mt-2 h-1.5 rounded-full bg-slate-800/70 overflow-hidden">
                      <div
                        className="h-full bg-teal-400 transition-all duration-1000"
                        style={{ width: `${Math.max(0, (roadmapAutoStartCountdown / 4) * 100)}%` }}
                      ></div>
                    </div>
                  </div>
                )}

                <div className="flex items-center justify-center mb-4">
                  <button
                    onClick={openCurrentQuizFromRoadmap}
                    className="inline-flex items-center gap-2 rounded-xl border border-teal-300/40 bg-teal-500/20 px-4 py-2 text-sm font-bold text-teal-100 hover:bg-teal-500/30 transition-colors"
                  >
                    <i data-lucide="play-circle" className="w-4 h-4"></i>
                    {t.startCurrentQuiz}
                  </button>
                </div>

                <div ref={roadmapPageScrollRef} className="flex-1 overflow-y-auto custom-scrollbar pr-1 md:px-3 lg:px-4 space-y-3 md:space-y-4">
                  {(() => {
                    const sortedBankLessons = Object.values(tajweedBank || {})
                      .filter((lesson) => lesson && typeof lesson === 'object')
                      .sort((a, b) => Number(b?.createdAt || 0) - Number(a?.createdAt || 0));

                    if (sortedBankLessons.length === 0) {
                      return (
                        <div className="rounded-xl border border-slate-600/30 bg-slate-800/40 p-3 text-center text-slate-300 text-xs">
                          {t.noTajweedBankLessons}
                        </div>
                      );
                    }

                    const groupedMap = new Map();
                    const independentLessons = [];

                    sortedBankLessons.forEach((lesson) => {
                      const groupKey = getRoadmapLessonGroupKey(lesson);
                      if (groupKey === 'independent') {
                        independentLessons.push(lesson);
                        return;
                      }

                      if (!groupedMap.has(groupKey)) groupedMap.set(groupKey, []);
                      groupedMap.get(groupKey).push(lesson);
                    });

                    const dynamicGroupKeys = Array.from(groupedMap.keys())
                      .filter((key) => !ROADMAP_GROUP_ORDER.includes(key))
                      .sort((a, b) => a.localeCompare(b, 'ar'));

                    const orderedGroupKeys = [
                      ...ROADMAP_GROUP_ORDER.filter((key) => key !== 'independent' && groupedMap.has(key)),
                      ...dynamicGroupKeys,
                    ];

                    const groupedLessons = orderedGroupKeys
                      .map((groupKey) => ({
                        key: groupKey,
                        label: getRoadmapLessonGroupLabel(groupKey),
                        lessons: groupedMap.get(groupKey) || [],
                      }))
                      .filter((group) => group.lessons.length > 0);

                    const orderedSections = [
                      ...groupedLessons.map((group) => ({
                        type: 'group',
                        id: `group_${group.key}`,
                        rank: Number(group.lessons[0]?.createdAt || 0),
                        group,
                      })),
                      ...independentLessons.map((lesson, index) => ({
                        type: 'independent',
                        id: `independent_${lesson?.id || index}`,
                        rank: Number(lesson?.createdAt || 0),
                        lesson,
                      })),
                    ].sort((a, b) => Number(b.rank || 0) - Number(a.rank || 0));

                    const flatLessons = orderedSections.flatMap((section) => (
                      section.type === 'group' ? section.group.lessons : [section.lesson]
                    ));

                    const currentLessonId = String(selectedTajweedQuiz.lessonId || '');
                    const currentLessonTitleHint = normalizeForMatch(selectedTajweedQuiz.lessonTitle || '');

                    let currentLessonIndex = flatLessons.findIndex((lesson) => String(lesson?.id || '') === currentLessonId);
                    if (currentLessonIndex < 0 && currentLessonTitleHint) {
                      currentLessonIndex = flatLessons.findIndex((lesson) => {
                        const title = normalizeForMatch(lesson?.title || '');
                        return title && (title === currentLessonTitleHint || title.includes(currentLessonTitleHint) || currentLessonTitleHint.includes(title));
                      });
                    }

                    let lessonCounter = -1;

                    const renderLessonCard = (lesson, sectionId, lessonIndex) => {
                      lessonCounter += 1;

                      const isCurrent = lessonCounter === currentLessonIndex;
                      const lessonId = String(lesson?.id || '').trim() || `lesson_${sectionId}_${lessonIndex}_${lessonCounter}`;
                      const solvedState = getStudentSolvedLessonState(lesson, lessonId);
                      const solvedAttempts = Array.isArray(solvedState?.attempts) ? solvedState.attempts : [];
                      const isSolvedByStudent = !!solvedState?.isSolved || solvedAttempts.length > 0;
                      const isExpanded = expandedRoadmapLessonId === lessonId;

                      const cardClass = isCurrent
                        ? 'border-slate-400/55 bg-slate-900/75 text-slate-100 animate-roadmap-breathe'
                        : (isSolvedByStudent
                          ? 'border-slate-600/30 bg-slate-900/55 text-slate-300 opacity-60'
                          : 'border-slate-500/45 border-dashed bg-slate-900/70 text-slate-200');

                      const currentRequestedVersionId = isCurrent
                        ? String(selectedTajweedQuiz?.versionId || '').trim()
                        : '';
                      const currentRequestedLanguage = isCurrent
                        ? (normalizeAssignmentContentLanguage(selectedTajweedQuiz?.contentLanguage)
                          || normalizeAssignmentContentLanguage(selectedTajweedQuiz?.lessonLanguage)
                          || getDefaultContentLanguageForLesson(lesson))
                        : getDefaultContentLanguageForLesson(lesson);

                      const defaultVersion = getAssignmentExamVersion(lesson, {
                        versionId: currentRequestedVersionId || undefined,
                        contentLanguage: currentRequestedLanguage,
                      });
                      const videoUrl = getLessonVideoUrl(lesson, defaultVersion);
                      const pdfUrl = getLessonPdfUrl(lesson, defaultVersion);
                      const hasVideoResource = !!videoUrl;
                      const hasPdfResource = !!pdfUrl;

                      const lessonDisplayTitle = getRoadmapLessonTitle(lesson, defaultVersion);
                      const lessonQuestions = Array.isArray(defaultVersion?.questions)
                        ? defaultVersion.questions
                        : (Array.isArray(lesson?.questions) ? lesson.questions : []);
                      const hasQuizQuestions = lessonQuestions.length > 0;
                      const canStartCurrentQuiz = isCurrent && hasQuizQuestions;

                      return (
                        <div
                          key={`roadmap_page_lesson_${lessonId}`}
                          data-current-roadmap={isCurrent ? 'true' : 'false'}
                          className={`rounded-[18px] border p-3 transition-colors ${cardClass}`}
                        >
                          <div className="flex items-start justify-between gap-2">
                            <div className="min-w-0 flex-1">
                              <p className={`${isArabic ? 'text-lg md:text-xl' : 'text-xs md:text-sm'} font-bold truncate`}>{toArabicNums(lessonCounter + 1)}. {lessonDisplayTitle}</p>
                              <p className={`text-[10px] md:text-xs mt-1 ${isArabic ? 'opacity-80' : 'opacity-90'}`}>{t.questionsCount}: {toArabicNums(lessonQuestions.length)}</p>
                            </div>

                            {isCurrent ? (
                              <span className="shrink-0 rounded-full border border-teal-300/40 bg-teal-500/20 px-2 py-0.5 text-[10px] font-semibold text-teal-50">
                                {t.learningRoadmapCurrent}
                              </span>
                            ) : isSolvedByStudent ? (
                              <span className="shrink-0 rounded-full border border-slate-500/35 bg-slate-700/50 p-1.5 text-slate-200">
                                <i data-lucide="check" className="w-3 h-3"></i>
                              </span>
                            ) : (
                              <span className="shrink-0 rounded-full border border-amber-300/35 bg-amber-500/15 px-2 py-0.5 text-[10px] font-bold text-amber-100">
                                {t.learningRoadmapUpcoming}
                              </span>
                            )}
                          </div>

                          <div className="mt-3 space-y-2">
                            <div className="flex items-center gap-1.5 md:gap-2 flex-nowrap">
                              {hasVideoResource ? (
                                <a
                                  href={videoUrl}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="inline-flex min-w-0 flex-1 md:flex-none items-center justify-center gap-1 rounded-md border border-slate-500/35 bg-slate-800/45 px-2 py-1.5 text-[10px] md:text-xs font-semibold text-slate-100 hover:bg-slate-700/55 transition-colors whitespace-nowrap"
                                >
                                  <i data-lucide="play-circle" className="hidden md:block w-3.5 h-3.5"></i>
                                  {t.watchLessonVideo}
                                </a>
                              ) : (
                                <button
                                  type="button"
                                  disabled
                                  className="inline-flex min-w-0 flex-1 md:flex-none items-center justify-center gap-1 rounded-md border border-slate-500/25 bg-slate-800/25 px-2 py-1.5 text-[10px] md:text-xs font-semibold text-slate-400/70 cursor-not-allowed whitespace-nowrap"
                                >
                                  <i data-lucide="play-circle" className="hidden md:block w-3.5 h-3.5"></i>
                                  {t.watchLessonVideo}
                                </button>
                              )}

                              {hasPdfResource ? (
                                <a
                                  href={pdfUrl}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="inline-flex min-w-0 flex-1 md:flex-none items-center justify-center gap-1 rounded-md border border-slate-500/35 bg-slate-800/45 px-2 py-1.5 text-[10px] md:text-xs font-semibold text-slate-100 hover:bg-slate-700/55 transition-colors whitespace-nowrap"
                                >
                                  <i data-lucide="file-down" className="hidden md:block w-3.5 h-3.5"></i>
                                  {t.downloadLessonPdf}
                                </a>
                              ) : (
                                <button
                                  type="button"
                                  disabled
                                  className="inline-flex min-w-0 flex-1 md:flex-none items-center justify-center gap-1 rounded-md border border-slate-500/25 bg-slate-800/25 px-2 py-1.5 text-[10px] md:text-xs font-semibold text-slate-400/70 cursor-not-allowed whitespace-nowrap"
                                >
                                  <i data-lucide="file-down" className="hidden md:block w-3.5 h-3.5"></i>
                                  {t.downloadLessonPdf}
                                </button>
                              )}

                              <button
                                type="button"
                                onClick={canStartCurrentQuiz ? openCurrentQuizFromRoadmap : undefined}
                                disabled={!canStartCurrentQuiz}
                                className={`inline-flex min-w-0 flex-1 md:flex-none items-center justify-center gap-1 rounded-md border px-2 py-1.5 text-[10px] md:text-xs font-semibold transition-colors whitespace-nowrap ${canStartCurrentQuiz
                                  ? 'border-teal-300/35 bg-teal-500/10 text-teal-100 hover:bg-teal-500/20'
                                  : 'border-slate-500/30 bg-slate-700/30 text-slate-300/80 cursor-not-allowed'}`}
                              >
                                <i data-lucide="target" className="hidden md:block w-3.5 h-3.5"></i>
                                {t.startCurrentQuiz}
                              </button>
                            </div>

                            {isSolvedByStudent && (
                              <button
                                type="button"
                                onClick={() => setExpandedRoadmapLessonId((prev) => prev === lessonId ? '' : lessonId)}
                                className="inline-flex items-center gap-1 rounded-md border border-slate-400/35 bg-slate-700/45 px-2.5 py-1.5 text-[10px] md:text-xs font-bold text-slate-100 hover:bg-slate-700/65 transition-colors"
                              >
                                <i data-lucide={isExpanded ? 'chevron-up' : 'history'} className="w-3.5 h-3.5"></i>
                                {isExpanded ? t.previousSolutionsHide : t.previousSolutionsToggle}
                              </button>
                            )}
                          </div>

                          {isSolvedByStudent && isExpanded && (
                            <div className="mt-3 pt-3 border-t border-white/10 space-y-2">
                              <p className="text-[11px] md:text-xs font-bold text-slate-100">{t.previousSolutionsTitle}</p>

                              {solvedAttempts.length === 0 ? (
                                <p className="text-[10px] md:text-xs text-slate-300/90">{t.previousSolutionsEmpty}</p>
                              ) : (
                                <div className="space-y-2">
                                  {solvedAttempts.map((attempt, attemptIndex) => (
                                    <div
                                      key={`attempt_${lessonId}_${attempt?.id || attemptIndex}`}
                                      className="rounded-lg border border-slate-600/30 bg-slate-900/45 px-2.5 py-2"
                                    >
                                      <p className="text-[10px] md:text-xs font-bold text-slate-100">
                                        {t.previousSolutionAttempt} {toArabicNums(attemptIndex + 1)}
                                      </p>
                                      <p className="text-[10px] md:text-xs text-slate-300 mt-0.5">
                                        {t.previousSolutionSubmittedAt}: {formatSubmissionDateTime(attempt?.submittedAt)}
                                      </p>
                                      <p className="text-[10px] md:text-xs text-slate-200 mt-1">
                                        {t.previousSolutionPreviewText}: {getSubmissionAnswerPreview(attempt)}
                                      </p>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          )}

                        </div>
                      );
                    };

                    return (
                      <div className="space-y-3">
                        {orderedSections.map((section, sectionIndex) => {
                          if (section.type === 'independent') {
                            return (
                              <div key={`roadmap_page_independent_${section.id}_${sectionIndex}`} className="space-y-2">
                                {renderLessonCard(section.lesson, section.id, 0)}
                              </div>
                            );
                          }

                          return (
                            <div key={`roadmap_page_group_${section.group.key}_${sectionIndex}`} className="space-y-2">
                              <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-teal-500/10 border border-teal-300/25">
                                <span className="w-1.5 h-1.5 rounded-full bg-teal-300/85"></span>
                                <span className="text-[11px] md:text-xs font-semibold uppercase tracking-[0.14em] text-teal-100/95">
                                  {section.group.label}
                                </span>
                              </div>

                              <div className="space-y-2">
                                {section.group.lessons.map((lesson, lessonIndex) => renderLessonCard(lesson, section.id, lessonIndex))}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* Tajweed Quiz Modal */}
          {selectedTajweedQuiz && !showTajweedRoadmapPage && (
            <div className="fixed inset-0 bg-slate-900/55 backdrop-blur-[2px] z-[60] flex items-center justify-center p-4 md:p-4">
              <div className="glass-panel w-full max-w-lg max-h-[82dvh] md:max-h-[92vh] rounded-3xl p-5 relative animate-fade border border-islamic-gold/30 shadow-[0_0_30px_rgba(217,119,6,0.1)] overflow-hidden flex flex-col">
                <button
                  onClick={closeTajweedQuiz}
                  className={`absolute top-3 ${isArabic ? 'left-3' : 'right-3'} text-slate-400 hover:text-white transition-colors z-[100] bg-slate-900/50 hover:bg-slate-800 rounded-full w-10 h-10 flex items-center justify-center shadow-lg`}
                >
                  <i data-lucide="x" className="w-5 h-5"></i>
                </button>

                <div className="text-center mb-4">
                  <div className="inline-flex items-center justify-center w-11 h-11 rounded-full bg-teal-500/20 text-teal-300 mb-2 border border-teal-400/30">
                    <i data-lucide="graduation-cap" className="w-5 h-5"></i>
                  </div>
                  <h3 className={`text-xl font-bold text-teal-200 ${headerFontClass}`}>{t.tajweedQuizTitle}</h3>
                </div>

                {selectedTajweedQuiz.missing ? (
                  <p className="text-slate-300 text-center">{t.noTajweedQuiz}</p>
                ) : (
                  <div ref={quizScrollRef} className="space-y-3 flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-1 md:px-3 lg:px-4">
                    <div className="rounded-xl border border-teal-400/20 bg-teal-900/20 p-3">
                      <p className="font-bold text-teal-200">{selectedTajweedQuiz.lessonTitle}</p>
                      <p className="text-xs text-slate-300 mt-1">{t.assignedAt}: {(() => {
                        const ts = selectedTajweedQuiz.assignedAt;
                        if (!ts) return '-';
                        const d = new Date(ts);
                        return isArabic
                          ? `${toArabicNums(d.getDate())} ${arabicMonthNames[d.getMonth()]} ${toArabicNums(d.getFullYear())}`
                          : `${monthNames[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
                      })()}</p>
                      <p className="text-xs text-slate-300">{t.questionsCount}: {toArabicNums((Array.isArray(selectedTajweedQuiz.questions) ? selectedTajweedQuiz.questions : []).length)}</p>
                      <p className="text-xs text-teal-100/80 mt-1">{t.quizIntro}</p>
                    </div>

                    {!selectedTajweedQuiz.assignmentId && (
                      <div className="rounded-xl border border-amber-400/30 bg-amber-500/10 p-3 text-xs text-amber-100">
                        {t.quizPreviewOnly}
                      </div>
                    )}

                    <button
                      type="button"
                      onClick={openLearningRoadmapPage}
                      className="w-full inline-flex items-center justify-center gap-2 rounded-xl border border-sky-300/35 bg-sky-500/15 px-3 py-2 text-xs font-bold text-sky-100 hover:bg-sky-500/25 transition-colors"
                    >
                      <i data-lucide="map" className="w-3.5 h-3.5"></i>
                      {t.openLearningRoadmap}
                    </button>

                    {(Array.isArray(selectedTajweedQuiz.questions) ? selectedTajweedQuiz.questions : []).length === 0 && (
                      <div className="rounded-xl border border-slate-600/30 bg-slate-800/50 p-4 text-center text-slate-300 text-sm">
                        {t.noTajweedQuiz}
                      </div>
                    )}

                    {(() => {
                      const allQuizQuestions = Array.isArray(selectedTajweedQuiz.questions) ? selectedTajweedQuiz.questions : [];
                      const indexedQuizQuestions = allQuizQuestions.map((question, index) => ({
                        question,
                        index,
                        type: normalizeQuestionType(question),
                      }));

                      const questionSections = [
                        { type: 'multiple_choice', title: t.questionTypeChoice, questions: indexedQuizQuestions.filter((item) => item.type === 'multiple_choice') },
                        { type: 'text', title: t.questionTypeText, questions: indexedQuizQuestions.filter((item) => item.type === 'text') },
                        { type: 'audio', title: t.questionTypeAudio, questions: indexedQuizQuestions.filter((item) => item.type === 'audio') },
                      ].filter((section) => section.questions.length > 0);

                      return questionSections.map((section) => (
                        <div key={`section_${section.type}`} className="space-y-3">
                          <div className="rounded-xl border border-teal-400/20 bg-teal-900/20 px-3 py-2">
                            <p className="text-xs font-bold text-teal-200">{section.title}</p>
                          </div>

                          <div className="space-y-3">
                            {section.questions.map(({ question: q, index: originalIndex }, questionIndex) => {
                              const questionType = normalizeQuestionType(q);
                              const questionKey = getQuestionKey(q, originalIndex);
                              const answer = quizDraftAnswers[questionKey] || {};
                              const hasError = !!quizValidationErrors[questionKey];
                              const requestedLanguage = selectedTajweedQuiz.contentLanguage || selectedTajweedQuiz.lessonLanguage;
                              const localizedQuestionText = getLocalizedQuizQuestionText(q, requestedLanguage);
                              const localizedQuestionOptions = getLocalizedQuizQuestionOptions(q, requestedLanguage);

                              return (
                                <div
                                  key={questionKey}
                                  className={`rounded-2xl border p-3.5 transition-colors ${hasError ? 'border-rose-400/70 bg-rose-950/20' : 'border-slate-600/30 bg-slate-800/50'}`}
                                >
                                  <div className="mb-2">
                                    <p className="text-sm text-white font-semibold">{toArabicNums(questionIndex + 1)}. {localizedQuestionText}</p>
                                  </div>

                                  {questionType === 'multiple_choice' && (
                                    <div className="mt-2 space-y-2">
                                      {localizedQuestionOptions.map((opt, idx) => (
                                        <label
                                          key={`${questionKey}_opt_${idx}`}
                                          className={`flex items-center gap-2 rounded-xl border px-3 py-2 cursor-pointer transition-colors ${answer.selectedOptionIndex === idx ? 'border-teal-400/60 bg-teal-500/10 text-teal-100' : 'border-slate-600/30 bg-slate-900/40 text-slate-200 hover:border-teal-500/40'}`}
                                        >
                                          <input
                                            type="radio"
                                            name={`quiz_${questionKey}`}
                                            checked={answer.selectedOptionIndex === idx}
                                            onChange={() => {
                                              upsertQuizDraftAnswer(questionKey, q.id || questionKey, { selectedOptionIndex: idx });
                                              setQuizStatusMessage('');
                                            }}
                                            className="accent-teal-400"
                                          />
                                          <span className="text-sm">{opt}</span>
                                        </label>
                                      ))}
                                    </div>
                                  )}

                                  {questionType === 'audio' && (
                                    <div className="mt-2 space-y-2">
                                      <div className="flex flex-wrap gap-2">
                                        {recordingQuestionKey === questionKey ? (
                                          <button
                                            type="button"
                                            onClick={stopQuizRecording}
                                            className="inline-flex items-center gap-1.5 rounded-lg border border-rose-400/50 bg-rose-500/20 px-3 py-1.5 text-xs font-bold text-rose-100 hover:bg-rose-500/30 transition-colors"
                                          >
                                            <i data-lucide="pause-circle" className="w-3.5 h-3.5"></i>
                                            {t.stopRecording}
                                          </button>
                                        ) : (
                                          <button
                                            type="button"
                                            onClick={() => startQuizRecording(questionKey, q.id || questionKey)}
                                            className="inline-flex items-center gap-1.5 rounded-lg border border-teal-300/50 bg-teal-500/20 px-3 py-1.5 text-xs font-bold text-teal-100 hover:bg-teal-500/30 transition-colors"
                                          >
                                            <i data-lucide="mic" className="w-3.5 h-3.5"></i>
                                            {t.startRecording}
                                          </button>
                                        )}

                                        {!!answer.audioBase64 && (
                                          <button
                                            type="button"
                                            onClick={() => removeQuizAudioDraft(questionKey, q.id || questionKey)}
                                            className="inline-flex items-center gap-1.5 rounded-lg border border-slate-400/40 bg-slate-700/50 px-3 py-1.5 text-xs font-bold text-slate-100 hover:bg-slate-700/70 transition-colors"
                                          >
                                            <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                            {t.deleteRecording}
                                          </button>
                                        )}
                                      </div>

                                      {!!answer.audioBase64 ? (
                                        <audio controls src={answer.audioBase64} className="w-full" />
                                      ) : (
                                        <p className="text-xs text-slate-400">{t.recordingHint}</p>
                                      )}
                                    </div>
                                  )}

                                  {questionType === 'text' && (
                                    <textarea
                                      value={answer.answerText || ''}
                                      onChange={(event) => {
                                        upsertQuizDraftAnswer(questionKey, q.id || questionKey, { answerText: event.target.value });
                                        setQuizStatusMessage('');
                                      }}
                                      placeholder={t.writeAnswer}
                                      className={`mt-2 w-full min-h-[96px] rounded-xl border bg-slate-900/40 p-3 text-sm text-slate-100 outline-none transition-colors ${hasError ? 'border-rose-400/70 focus:border-rose-300' : 'border-slate-600/40 focus:border-teal-400/60'}`}
                                    />
                                  )}

                                  {hasError && (
                                    <p className="text-xs text-rose-300 mt-2">{t.fieldRequired}</p>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ));
                    })()}

                    {quizStatusMessage && (
                      <div className={`rounded-xl border px-3 py-2 text-sm ${quizStatusMessage === t.submitSuccess ? 'border-emerald-400/40 bg-emerald-500/15 text-emerald-100' : 'border-amber-400/35 bg-amber-500/10 text-amber-100'}`}>
                        {quizStatusMessage}
                      </div>
                    )}

                    {selectedTajweedQuiz.assignmentId && !selectedTajweedQuiz.missing && (Array.isArray(selectedTajweedQuiz.questions) ? selectedTajweedQuiz.questions : []).length > 0 && (
                      <button
                        type="button"
                        onClick={submitTajweedQuiz}
                        disabled={isQuizSubmitting}
                        className="w-full mt-1 inline-flex items-center justify-center gap-2 rounded-xl border border-emerald-400/50 bg-emerald-600/80 px-4 py-2.5 text-sm font-bold text-white hover:bg-emerald-600 disabled:opacity-60 disabled:cursor-not-allowed transition-colors"
                      >
                        <i data-lucide="send" className="w-4 h-4"></i>
                        {isQuizSubmitting ? t.submittingQuiz : t.submitQuiz}
                      </button>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}

        </div>
      );
    } // End App

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(req => console.log('Service Worker Registered!'))
          .catch(err => console.error('Service Worker Registration Failed:', err));
      });
    }
  </script>
</body>

</html>
