<body class="text-slate-100 font-sans min-h-screen relative">
  <!-- Custom user-provided background layer -->
  <div class="fixed inset-0 z-[-1] opacity-10"
    style="background-image: url('./bg.png'); background-size: 20%; background-repeat: repeat; background-position: center;">
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const STATUS = {
      PRESENT: '1',
      PAID_ABSENCE: '!',
      DOUBLE_CLASS: '2',
      EXTRA_DOUBLE: 'ed',
      EXTRA_DAY: 'e',
      ABSENCE_RED: '0',
      UNEXCUSED_ABSENCE: '-',
      POSTPONED: 'p',
      EXEMPT: 'x'
    };

    const monthNames = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    const parseReport = (text) => {
      if (!text) return [];
      const lines = text.split('\n');
      const sections = [];

      let currentTitle = 'Summary';
      let currentContent = [];

      const keywords = [
        { id: 'new', type: 'classwork', match: ['new', 'الجديد', 'الحفظ'], icon: 'sparkles' },
        { id: 'quran', type: 'classwork', match: ['quran', 'قرآن', 'القرآن', 'recitation'], icon: 'check-circle-2' },
        { id: 'reading', type: 'classwork', match: ['reading', 'قراءة', 'تلاوة', 'التلاوة', 'قرائية'], icon: 'check-circle-2' },
        { id: 'old_revision', type: 'classwork', match: ['old', 'قديم', 'بعيد', 'ماضي'], icon: 'check-circle-2' },
        { id: 'revision', type: 'classwork', match: ['revision', 'مراجعة', 'المراجعة'], icon: 'check-circle-2' },
        { id: 'noor', type: 'classwork', match: ['noor', 'نور', 'bayan', 'بيان'], icon: 'check-circle-2' },
        { id: 'islamic', type: 'classwork', match: ['islamic', 'اسلامية', 'إسلامية'], icon: 'check-circle-2' },
        { id: 'arabic', type: 'classwork', match: ['arabic'], icon: 'book' },
        { id: 'homework', type: 'homework', match: ['homework', 'واجب', 'الواجب', 'next', 'القادم', 'ما سيتم', 'سيتم'], icon: 'pen-tool' },
        { id: 'feedback', type: 'feedback', match: ['behavior', 'سلوك', 'السلوك'], icon: 'star' },
        { id: 'note', type: 'feedback', match: ['note', 'ملاحظة', 'ملاحظات'], icon: 'message-square' },
        { id: 'audio', type: 'audio', match: ['🎧', 'للاستماع', 'audio correction'], icon: 'headphones' }
      ];

      // Track repeated titles: same title twice → second becomes homework
      const seenTitles = new Set();

      const getSectionMeta = (title) => {
        const lowerT = title.toLowerCase().trim();
        for (const kw of keywords) {
          if (kw.match.some(m => lowerT.includes(m))) {
            if (kw.type === 'classwork') {
              if (seenTitles.has(lowerT)) return { icon: 'pen-tool', type: 'homework' };
              seenTitles.add(lowerT);
              return { icon: kw.icon, type: 'classwork' };
            }
            return { icon: kw.icon, type: kw.type };
          }
        }
        // Unknown section — also tracks repetition
        if (seenTitles.has(lowerT)) return { icon: 'pen-tool', type: 'homework' };
        seenTitles.add(lowerT);
        return { icon: 'file-text', type: 'other' };
      };

      let currentArabicSubject = null;

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i].replace(/\*/g, '').replace(/_/g, '').replace(/〰️/g, '').replace(/ـ/g, '').trim();
        if (/^[-]+$/.test(line)) continue;
        if (!line) continue;

        // Extract subject name from 📚/📖 (SubjectName) emoji headers, then skip
        if (line.includes('📚') || line.includes('📖')) {
          const subjectMatch = line.match(/\(([^)]+)\)/);
          if (subjectMatch) currentArabicSubject = subjectMatch[1].trim();
          continue;
        }

        // Hide redundant header text
        if (
          line.toLowerCase().includes('(arabic)') ||
          line.toLowerCase().startsWith('student:') ||
          line.startsWith('الطالب:') ||
          line.toLowerCase().startsWith('date:') ||
          line.startsWith('التاريخ:') ||
          line.toLowerCase().includes('class report') ||
          line.includes('تقرير الحصة')
        ) {
          continue;
        }

        // Section matching
        if (line.includes(':')) {
          const parts = line.split(':');
          let potentialTitle = parts[0].replace(/^[•\-\s]+/, '').trim();

          // Intercept specific English headers to unify them under 'Arabic'
          if (potentialTitle.toLowerCase().includes('session summary') || potentialTitle.toLowerCase().includes('next session plan')) {
            potentialTitle = 'Arabic';
          }

          // Intercept Arabic book sub-sections (إنجاز الحصة / حصتنا القادمة) → use parent subject as title
          if (currentArabicSubject && (
            potentialTitle.includes('إنجاز') ||
            potentialTitle.includes('حصتنا') ||
            potentialTitle.includes('القادمة')
          )) {
            potentialTitle = currentArabicSubject;
          }

          let isSectionHeader = false;
          for (const kw of keywords) {
            if (kw.match.some(m => potentialTitle.toLowerCase().includes(m))) {
              isSectionHeader = true;
              break;
            }
          }

          if (isSectionHeader) {
            if (currentContent.length > 0 && currentTitle !== 'Summary') {
              const meta = getSectionMeta(currentTitle);
              sections.push({ title: currentTitle, content: currentContent.join('\n').trim(), ...meta });
            }
            currentTitle = potentialTitle;
            const contentAfter = parts.slice(1).join(':').trim();
            currentContent = contentAfter ? [contentAfter] : [];
            continue;
          }
        }
        currentContent.push(line);
      }

      if (currentContent.length > 0 && currentTitle !== 'Summary') {
        const meta = getSectionMeta(currentTitle);
        sections.push({ title: currentTitle, content: currentContent.join('\n').trim(), ...meta });
      }

      return sections.length > 0 ? sections : [{ title: 'Report Overview', content: text.replace(/〰️/g, ''), icon: 'file-text', type: 'other' }];
    };

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [selectedReport, setSelectedReport] = useState(null);

      // Tour state
      const [isTourMode, setIsTourMode] = useState(false);

      const searchParams = new URLSearchParams(window.location.search);
      const studentId = searchParams.get('student');
      // Name-based routing: /ahmed-hassan takes priority over ?student=ID
      const nameSlug = window.location.pathname.replace(/^\//, '').toLowerCase().trim();

      // PWA Smart Redirect: uses cookies (shared between Safari & iOS standalone PWA)
      useEffect(() => {
        const getCookie = (name) => {
          const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
          return match ? decodeURIComponent(match[2]) : null;
        };
        const setCookie = (name, value) => {
          document.cookie = `${name}=${encodeURIComponent(value)};path=/;max-age=${60 * 60 * 24 * 365};SameSite=Lax`;
        };

        if (!studentId && !nameSlug) {
          const savedPath = getCookie('student_path');
          if (savedPath && savedPath !== '/') {
            window.location.href = savedPath;
          }
        } else {
          setCookie('student_path', window.location.pathname + window.location.search);
        }
      }, []);

      useEffect(() => {
        const fetchData = async () => {
          if (!studentId && !nameSlug) {
            setError('Invalid student link. Please check the URL.');
            setLoading(false);
            return;
          }

          try {
            const response = await axios.get('https://quran-classes-tracker-default-rtdb.firebaseio.com/appState.json');
            setData(response.data);
          } catch (err) {
            console.error(err);
            setError('Failed to load data. Please try again later.');
          } finally {
            setLoading(false);
          }
        };

        fetchData();
      }, [studentId]);

      useEffect(() => {
        if (!loading && window.lucide) {
          window.lucide.createIcons();
        }
      });

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') {
            setSelectedReport(null);
          }
        };
        if (selectedReport) {
          window.addEventListener('keydown', handleKeyDown);
        }
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedReport]);

      const toSlug = (name) => {
        if (!name) return '';
        const arabicToLatin = {
          'ا': 'a', 'أ': 'a', 'إ': 'e', 'آ': 'a', 'ب': 'b', 'ت': 't', 'ث': 'th',
          'ج': 'j', 'ح': 'h', 'خ': 'kh', 'د': 'd', 'ذ': 'dh', 'ر': 'r', 'ز': 'z',
          'س': 's', 'ش': 'sh', 'ص': 's', 'ض': 'd', 'ط': 't', 'ظ': 'z', 'ع': 'a',
          'غ': 'gh', 'ف': 'f', 'ق': 'q', 'ك': 'k', 'ل': 'l', 'م': 'm', 'ن': 'n',
          'ه': 'h', 'ة': 'a', 'و': 'w', 'ي': 'y', 'ى': 'a', 'ئ': 'e', 'ؤ': 'o'
        };
        let transliterated = name.toLowerCase().trim();
        for (const [ar, en] of Object.entries(arabicToLatin)) {
          transliterated = transliterated.replace(new RegExp(ar, 'g'), en);
        }
        return transliterated.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      };

      // First, determine the actual student from URL/ID to know the language
      const urlStudent = data?.students ? (nameSlug
        ? data.students.find(s => toSlug(s?.name) === nameSlug)
        : data.students.find(s => String(s.id) === String(studentId))) : null;

      const isArabic = urlStudent ? /[\u0600-\u06FF]/.test(urlStudent.name) : false;

      // Setup dynamic document title
      useEffect(() => {
        if (urlStudent) {
          document.title = isArabic ? `تقرير ${urlStudent.name}` : `${urlStudent.name} - Report`;
        }
      }, [urlStudent, isArabic]);

      const fontClass = isArabic ? "font-amiri" : "font-sans";
      const headerFontClass = isArabic ? "font-amiri" : "font-cinzel";

      // Mock Data for Tour Mode
      const mockReportTextEn = `📖 *Class Report*

Student: EESA
Date: Wednesday 25 March 2026
Class Number: 1 of 9

ــــــــــــــــــــــــــــــ

📖 *(Quran)*

✅ *Session Summary:*

*• New:*
From Surah Al-Imran Ayah 1 to Surah Al-Ma'idah Ayah 4

*• Revision:*
Surah Al-Baqara (From 1 to 50)

*• Old Revision:*
From Surah An-Naba to Surah Al-A'la

〰️〰️〰️〰️〰️

📝 *Next Session Plan:*

*• New:*
Surah Al-Ma'idah (From 5 to 15)

*• Revision:*
From Surah Al-Baqara Ayah 51 to Surah Al-Imran Ayah 30

*• Old Revision:*
From Surah Al-Ghashiyah to Surah An-Nas

ــــــــــــــــــــــــــــــ

✏️ *Notes:*
Please make sure to focus on Surah An-Naba and listen to the Sheikh.
ــــــــــــــــــــــــــــــ

🎧 *Audio Corrections:*
https://is.gd/oL6gEO`;

      const mockDataEn = {
        students: [{
          id: "mock",
          name: urlStudent ? `${urlStudent.name} (Tour)` : "EESA (Tour Account)",
          days: [1, 3], // Mon and Wed
          duration: "30",
          zoomLink: "https://zoom.us/j/mock"
        }],
        month: 2, // March (0-indexed)
        year: 2026,
        attendance: {
          "mock_2_2_2026": "1", // Present
          "mock_4_2_2026": "!", // Paid Absence
          "mock_9_2_2026": "-" // Compensated
        },
        savedReports: {
          "mock_2_2_2026": mockReportTextEn
        }
      };

      const mockReportTextAr = `📖 *تقرير الحصة*


التاريخ: الأربعاء ٢٥ مارس ٢٠٢٦
رقم الحصة: ٢ من ٩

ــــــــــــــــــــــــــــــ

📖 *(القرآن الكريم)*

✅ *إنجاز الحصة:*

*• الجديد:*
سورة المائدة (من ٥ إلى ١٥)

*• المراجعة:*
من سورة البقرة آية ٥١ إلى سورة آل عمران آية ٣٠

*• المراجعة البعيدة:*
من سورة الغاشية آية ٥ إلى سورة الناس آية ٦

〰️〰️〰️〰️〰️

📝 *حصتنا القادمة:*

*• الجديد:*
سورة المائدة (١٦)

*• المراجعة:*
من سورة البقرة آية ٥١ إلى سورة المائدة آية ١٥

*• المراجعة البعيدة:*
سورة الناس (٧)

ــــــــــــــــــــــــــــــ

✏️ *ملاحظات:*
من فضلك يرجى التركيز على الاستماع للشيخ والتركيز على سورة العصر
ــــــــــــــــــــــــــــــ

🎧 *للاستماع إلى التوجيهات:*
https://is.gd/oL6gEO`;

      const mockDataAr = {
        students: [{
          id: "mock",
          name: urlStudent ? `${urlStudent.name} (جولة تعريفية)` : "سبوح قدوس (جولة تعريفية)",
          days: [1, 3], // Mon and Wed
          duration: "30",
          zoomLink: "https://zoom.us/j/mock"
        }],
        month: 2, // March (0-indexed)
        year: 2026,
        attendance: {
          "mock_2_2_2026": "1", // Present
          "mock_4_2_2026": "!", // Paid Absence
          "mock_9_2_2026": "-" // Compensated
        },
        savedReports: {
          "mock_2_2_2026": mockReportTextAr
        }
      };



      // Now, select activeData based on tour mode and language
      const activeData = isTourMode ? (isArabic ? mockDataAr : mockDataEn) : data;

      const { students, attendance, month, year, savedReports } = activeData || {};

      // The student object used throughout the component
      const student = isTourMode ? activeData.students[0] : urlStudent;

      const toArabicNums = (str) => {
        if (!isArabic) return str;
        return String(str).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
      };

      const arabicMonthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
      const currentMonthNames = isArabic ? arabicMonthNames : monthNames;

      const arabicWeekDays = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
      const currentWeekDays = isArabic ? arabicWeekDays : weekDays;

      const t = isArabic ? {
        studentNotFound: "لم يتم العثور على الطالب",
        noRecord: "لا يوجد سجل لهذا الطالب في النظام.",
        monthlySchedule: "سجل الحضور والغياب",
        classesAttended: "حصص الحضور",
        missedClasses: "حصص الغياب",
        present: "حاضر",
        absent: "غائب",
        compensated: "تم التعويض",
        scheduled: "مجدولة",
        reportAvailable: "التقرير متاح",
        joinClass: "دخول الحصة",
        scheduleClass: "طلب جدولة",
        dailyReport: "التقرير المفصل",
        completedInClass: "ما تم إنجازه",
        homeworkNextClass: "الواجب والمطلوب",
        feedbackNotes: "ملاحظات إضافية",
        otherDetails: "تفاصيل أخرى",
        audio: "الصوتيات",
        audioRecording: "تسجيل صوتي",
        noDetails: "لا توجد تفاصيل إضافية.",
        errorTitle: "خطأ",
        errorLoad: "فشل تحميل البيانات. يرجى المحاولة لاحقاً.",
        next: "التالي",
        prev: "السابق",
        done: "إنهاء",

        tourProfileTitle: "ملف الطالب",
        tourProfileDesc: "هنا يظهر اسم الطالب وملفه الشخصي.",
        tourMonthTitle: "الشهر الحالي",
        tourMonthDesc: "يعرض الشهر والسنة الحالية المحددة.",
        tourCalendarTitle: "سجل الحضور",
        tourCalendarDesc: "يعرض التقويم سجل الحضور بشكل مرئي. دعنا نشرح الألوان.",
        tourGreenTitle: "حاضر (أخضر)",
        tourGreenDesc: "أخضر = حاضر. مثال على يوم حضر فيه الطالب بنجاح.",
        tourRedTitle: "غائب (أحمر)",
        tourRedDesc: "أحمر = غائب. الطالب تغيب عن هذه الحصة المجدولة.",
        tourYellowTitle: "تم التعويض (أصفر)",

      };

      const startTour = () => {
        setIsTourMode(true);
        setTimeout(() => {
          if (window.lucide) window.lucide.createIcons();
          setTimeout(() => {
            const driverObj = window.driver.js.driver({
              showProgress: false,
              animate: true,
              nextBtnText: t.next,
              prevBtnText: t.prev,
              doneBtnText: t.done,
              popoverClass: isArabic ? 'driver-rtl' : '',
              overlayColor: 'rgba(0, 0, 0, 0.75)',
              stagePadding: 8,
              stageRadius: 12,
              allowClose: true,
              onDestroyed: () => {
                setIsTourMode(false);
                setSelectedReport(null);
              },
              steps: [
                {
                  element: '#tour-header',
                  popover: {
                    title: t.tourProfileTitle,
                    description: t.tourProfileDesc,
                    side: 'bottom',
                    align: 'center'
                  }
                },
                {
                  element: '#tour-month',

                    title: t.tourMonthTitle,
                    description: t.tourMonthDesc,

                    description: t.tourCalendarDesc,
                    side: 'top',

      const FloatingHelpButton = () => (
        <button
          onClick={startTour}
          className="fixed bottom-6 left-6 z-[100] bg-islamic-800 text-islamic-light p-3 md:p-4 rounded-full shadow-[0_4px_20px_rgba(217,119,6,0.5)] border border-islamic-gold/50 hover:bg-islamic-900 hover:scale-110 transition-all duration-300"
          title="Start Tour"
        >
          <i data-lucide="help-circle" className="w-6 h-6 md:w-8 md:h-8"></i>
        </button>
      );

      const InstallPrompt = () => {
        const [isInstallable, setIsInstallable] = useState(false);
        const [deferredPrompt, setDeferredPrompt] = useState(null);
        const [isIOS, setIsIOS] = useState(false);
        const [showIOSHint, setShowIOSHint] = useState(false);
        const [dismissed, setDismissed] = useState(false);

        useEffect(() => {
          // Check if already installed or dismissed
          const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
          if (isStandalone || localStorage.getItem('pwa_dismissed') === 'true' || localStorage.getItem('pwa_installed') === 'true') {
            return;
          }

          // Always show the prompt if not installed (for UI visibility)
          setIsInstallable(true);

          // Detect iOS
          const objAgent = navigator.userAgent;
          const isIOSDevice = /iPad|iPhone|iPod/.test(objAgent) && !window.MSStream;
          setIsIOS(isIOSDevice);

          // Check if prompt was caught early
          if (window.pwaDeferredPrompt) {
            setDeferredPrompt(window.pwaDeferredPrompt);
          }

          // Listen for the prompt if it fires later
          const handlePwaReady = () => {
            setDeferredPrompt(window.pwaDeferredPrompt);
          };

          window.addEventListener('pwaPromptReady', handlePwaReady);

          // Listen for successful installation
          const handleInstalled = () => {
            localStorage.setItem('pwa_installed', 'true');
            setIsInstallable(false);
          };
          window.addEventListener('appinstalled', handleInstalled);

          return () => {
            window.removeEventListener('pwaPromptReady', handlePwaReady);
            window.removeEventListener('appinstalled', handleInstalled);
          };
        }, []);

        useEffect(() => {
          if (isInstallable && window.lucide) window.lucide.createIcons();
        }, [isInstallable, showIOSHint]);

        if (!isInstallable || dismissed) return null;

        const handleInstallClick = async () => {
          if (isIOS || !deferredPrompt) {
            setShowIOSHint(true);
            return;
          }

          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
              localStorage.setItem('pwa_installed', 'true');
              setIsInstallable(false);
            }
            setDeferredPrompt(null);
            window.pwaDeferredPrompt = null;
          }
        };

        const handleDismiss = () => {
          setDismissed(true);
          localStorage.setItem('pwa_dismissed', 'true');
        };

        return (
          <div className={`fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-96 glass-panel rounded-2xl p-4 shadow-[0_10px_30px_rgba(0,0,0,0.5)] z-[100] border-islamic-gold/30 animate-fade-up ${fontClass}`}>
            <button onClick={handleDismiss} className={`absolute ${isArabic ? 'left-3' : 'right-3'} top-3 text-slate-400 hover:text-white transition-colors`}>
              <i data-lucide="x" className="w-5 h-5"></i>
            </button>
            <div className="flex items-start gap-4">
              <div className="w-12 h-12 bg-islamic-800 rounded-xl flex items-center justify-center flex-shrink-0 border border-islamic-gold/20 shadow-inner">
                <i data-lucide="download" className="w-6 h-6 text-islamic-gold"></i>
              </div>
              <div className="flex-1 pr-6">
                <h4 className="text-white font-bold mb-1">{isArabic ? "تثبيت التطبيق" : "Install App"}</h4>
                <p className="text-xs text-slate-300 mb-3 leading-relaxed">{isArabic ? "قم بتثبيت كشكول الطالب على هاتفك للوصول السريع دائماً." : "Install the student portal on your device for quick access."}</p>
                <button onClick={handleInstallClick} className="bg-emerald-600/90 hover:bg-emerald-500 text-white text-xs font-semibold py-2 px-4 rounded-lg transition-colors w-full shadow-lg border border-emerald-400/20 uppercase tracking-widest">
                  {isArabic ? "تثبيت الآن" : "Install Now"}
                </button>
                {showIOSHint && (
                  <div className="mt-3 p-3 bg-blue-900/40 border border-blue-500/30 rounded-lg text-xs text-blue-200 flex items-start gap-2 animate-fade">
                    <i data-lucide="info" className="w-4 h-4 flex-shrink-0 mt-0.5 text-blue-400"></i>
                    <span>
                      {isIOS
                        ? (isArabic ? "في سفاري: اضغط على زر المشاركة (مربع بداخله سهم) ثم اختر 'إضافة إلى الشاشة الرئيسية'." : "In Safari: Tap Share (square with arrow) and select 'Add to Home'.")
                        : (isArabic ? "للتثبيت في متصفحك: انقر على الثلاث نقاط (القائمة) ثم ابحث عن 'تثبيت التطبيق' أو 'أضف للشاشة'." : "To install: Click your browser menu (three dots) and select 'Install app' or 'Add to Home'.")}
                    </span>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // Render Loading Phase
      if (!isTourMode && loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="animate-spin flex gap-2">
              <div className="w-4 h-4 rounded-full bg-islamic-gold"></div>
              <div className="w-4 h-4 rounded-full bg-islamic-gold"></div>
            </div>
          </div>
        );
      }

      if (!isTourMode && (error || !activeData || !activeData.students)) {
        return (
          <div className={`min-h-screen flex flex-col items-center justify-center p-6 text-center animate-fade ${fontClass}`} dir={isArabic ? 'rtl' : 'ltr'}>
            <i data-lucide="alert-circle" className="text-red-400 mb-4 w-16 h-16"></i>
            <h1 className={`text-2xl font-bold text-white mb-2 ${headerFontClass}`}>{t ? t.errorTitle : 'Error'}</h1>
            <p className="text-slate-400">{error || (t ? t.errorLoad : 'No data found')}</p>
          </div>
        );
      }

      const getScheduleLink = (durationStr) => {
        if (!durationStr) return null;
        const normalized = String(durationStr).replace(/[٠-٩]/g, (d) => "٠١٢٣٤٥٦٧٨٩".indexOf(d).toString()).trim();
        if (normalized === '30') return 'https://zcal.co/i/tYjuo5JV';
        if (normalized === '45') return 'https://zcal.co/i/ThNRhEes';
        if (normalized === '60') return 'https://zcal.co/i/_yKMg4po';
        return null;
      };

      if (!student) {
        return (
          <div className={`min-h-screen flex flex-col items-center justify-center p-6 text-center animate-fade ${fontClass}`} dir={isArabic ? 'rtl' : 'ltr'}>
            <i data-lucide="user-x" className="text-islamic-gold mb-4 w-16 h-16"></i>
            <h1 className={`text-2xl font-bold text-white mb-2 ${headerFontClass}`}>{t ? t.studentNotFound : 'Student Not Found'}</h1>
            <p className="text-slate-400">{t ? t.noRecord : 'There is no record for this student in the system.'}</p>
            <FloatingHelpButton />
          </div>
        );
      }

      const scheduleLink = getScheduleLink(student.duration);

      // Calendar Calculations
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayIndex = new Date(year, month, 1).getDay();

      const paddingDays = Array.from({ length: firstDayIndex }).map((_, i) => null);
      const monthDays = Array.from({ length: daysInMonth }).map((_, i) => i + 1);

      // Calculate Stats
      let presentCount = 0;
      let absentCount = 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const daysInMonthCounter = new Date(year, month + 1, 0).getDate();
      for (let d = 1; d <= daysInMonthCounter; d++) {
        const dateObj = new Date(year, month, d);
        const dayOfWeek = dateObj.getDay();
        const isSched = student.days?.includes(dayOfWeek);
        const attendanceKey = `${student.id}_${d}_${month}_${year}`;
        const st = attendance?.[attendanceKey];

        if ([STATUS.PRESENT, STATUS.DOUBLE_CLASS, STATUS.EXTRA_DAY, STATUS.EXTRA_DOUBLE].includes(st)) {
          presentCount++;
          if (st === STATUS.DOUBLE_CLASS || st === STATUS.EXTRA_DOUBLE) presentCount++;
        } else if ([STATUS.UNEXCUSED_ABSENCE, STATUS.ABSENCE_RED, STATUS.PAID_ABSENCE].includes(st)) {
          absentCount++;
        }
      }

      const closeReport = () => setSelectedReport(null);

      // Render Calendar Day
      const renderDay = (day) => {
        if (!day) return <div key={Math.random()} className="aspect-square opacity-0"></div>;

        const dateObj = new Date(year, month, day);
        const dayOfWeek = dateObj.getDay();

        const isScheduled = student.days?.includes(dayOfWeek);
        const attendanceKey = `${student.id}_${day}_${month}_${year}`;
        const status = attendance?.[attendanceKey];
        const rawReport = savedReports?.[attendanceKey];
        // If the status was deleted/cleared via Undo, hide the report icon even if report text remains in Firebase
        const reportText = status ? (typeof rawReport === 'string' ? rawReport : rawReport?.reportText || null) : null;

        let bgColor = "bg-white/5";
        let borderColor = "border-white/10";
        let statusIndicator = null;
        let opacityClass = "opacity-100";
        let isAbsent = false;
        let isCompensated = false;

        // Present statuses
        if ([STATUS.PRESENT, STATUS.DOUBLE_CLASS, STATUS.EXTRA_DAY, STATUS.EXTRA_DOUBLE].includes(status)) {
          bgColor = "bg-emerald-500/20";
          borderColor = "border-emerald-500/50";
          statusIndicator = <div className="absolute top-1 right-1 md:top-2 md:right-2 w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div>;
        }
        // Compensated Absences (Scroll clicks)
        else if ([STATUS.UNEXCUSED_ABSENCE, STATUS.ABSENCE_RED].includes(status)) {
          isCompensated = true;
          isAbsent = true;
        }
        // Regular Paid Absence (Right click)
        else if (status === STATUS.PAID_ABSENCE) {
          isAbsent = true;
        }

        if (isCompensated) {
          bgColor = "bg-amber-500/10";
          borderColor = "border-amber-500/40";
          statusIndicator = <div className="absolute top-1 right-1 md:top-2 md:right-2 w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.8)]" title="Compensated Class"></div>;
        } else if (isAbsent) {
          bgColor = "bg-red-500/10";
          borderColor = "border-red-500/30";
          statusIndicator = <div className="absolute top-1 right-1 md:top-2 md:right-2 w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-red-400 shadow-[0_0_8px_rgba(248,113,113,0.8)]"></div>;
        } else if (!status && !isScheduled) {
          bgColor = "bg-transparent";
          borderColor = "border-transparent";
          opacityClass = "opacity-25 blur-[0.5px]"; // Dim days without classes
        } else if (isScheduled && !isAbsent && !status) {
          borderColor = "border-islamic-gold/40 border-dashed";
        }

        return (
          <div
            id={isTourMode && [2, 4, 9].includes(day) ? `tour-day-${day}` : undefined}
            key={day}
            className={`relative flex flex-col items-center justify-center p-2 rounded-xl border ${bgColor} ${borderColor} ${opacityClass} transition-all duration-300 hover:border-islamic-gold/70 group aspect-square`}
          >
            {statusIndicator}
            <span className={`text-lg font-semibold ${isScheduled ? 'text-white' : 'text-slate-400'} ${reportText ? '-translate-y-1 md:translate-y-0' : ''}`}>
              {toArabicNums(day)}
            </span>

            {reportText && (
              <button
                id={isTourMode && day === 2 ? 'tour-report-btn' : undefined}
                onClick={() => {
                  setSelectedReport({ day, text: reportText });
                  if (isTourMode && day === 2 && window.driverObjInstance) {
                    setTimeout(() => window.driverObjInstance.moveNext(), 150);
                  }
                }}
                className="absolute bottom-1 left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:-mb-1 w-4 h-4 md:w-8 md:h-8 rounded-full bg-islamic-gold/20 text-islamic-gold hover:bg-islamic-gold hover:text-islamic-900 flex items-center justify-center transition-all duration-300 transform group-hover:scale-110 shadow-lg z-10"
                title="View Report"
              >
                <i data-lucide="file-text" className="w-2.5 h-2.5 md:w-4 md:h-4"></i>
              </button>
            )}
          </div>
        );
      };

      const renderSectionGroup = (sections, typeLabelClass, sideBorderClass, typeName, tourId) => {
        if (sections.length === 0) return null;
        return (
          <div id={tourId} className="mb-6">
            <h5 className={`text-[10px] uppercase font-bold tracking-widest mb-3 flex items-center gap-2 ${typeLabelClass}`}>
              <div className="h-px flex-1 bg-current opacity-20"></div>
              {typeName}
              <div className="h-px flex-1 bg-current opacity-20"></div>
            </h5>
            <div className={`${isArabic ? 'pr-4 border-r-[3px]' : 'pl-4 border-l-[3px]'} space-y-3 ${sideBorderClass}`}>
              {sections.map((section, idx) => {
                let bgClass = "bg-islamic-900/40 hover:bg-islamic-900/60";
                let borderClass = "border-islamic-gold/10 hover:border-islamic-gold/30";
                let iconBgClass = "bg-islamic-800/80 border-islamic-gold/20 text-islamic-gold";
                let titleClass = "text-emerald-400";

                if (section.type === 'homework') {
                  bgClass = "bg-amber-900/10 hover:bg-amber-900/20";
                  borderClass = "border-amber-500/20 hover:border-amber-500/40";
                  iconBgClass = "bg-amber-900/40 border-amber-500/30 text-amber-500";
                  titleClass = "text-amber-500";
                } else if (section.type === 'feedback') {
                  bgClass = "bg-blue-900/10 hover:bg-blue-900/20";
                  borderClass = "border-blue-500/20 hover:border-blue-500/40";
                  iconBgClass = "bg-blue-900/50 border-blue-500/30 text-blue-400";
                  titleClass = "text-blue-400";
                }

                return (
                  <div key={idx} className={`relative rounded-2xl p-4 flex gap-4 transition-transform hover:translate-x-1 duration-300 border ${bgClass} ${borderClass}`}>
                    <div className={`flex-shrink-0 w-8 h-8 rounded-full border flex items-center justify-center shadow-inner mt-0.5 ${iconBgClass}`}>
                      <i data-lucide={section.icon} className="w-4 h-4"></i>
                    </div>
                    <div className="flex-1 pr-4">
                      {(() => {
                        const isTitleArabic = /[\u0600-\u06FF]/.test(section.title);
                        return (
                          <h4
                            className={`font-bold mb-1 ${isTitleArabic ? 'font-amiri text-lg text-right' : 'text-[13px] uppercase tracking-widest'} ${titleClass}`}
                            dir={isTitleArabic ? 'rtl' : 'ltr'}
                          >
                            {section.title}
                          </h4>
                        );
                      })()}
                      {(() => {
                        const isContentArabic = /[\u0600-\u06FF]/.test(section.content);
                        return (
                          <div
                            className={`text-slate-200 text-sm whitespace-pre-wrap leading-loose mt-1 ${isContentArabic ? 'font-amiri text-base text-right' : 'font-sans'}`}
                            dir={isContentArabic ? 'rtl' : 'ltr'}
                          >
                            {section.content || <span className="opacity-40 italic">{t.noDetails}</span>}
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      return (
        <div className={`max-w-4xl mx-auto p-4 md:p-8 pb-20 relative ${fontClass}`} dir={isArabic ? 'rtl' : 'ltr'}>
          <style dangerouslySetInnerHTML={{
            __html: `
            .driver-rtl {
              direction: rtl !important;
              font-family: 'Amiri', serif !important;
            }
            .driver-rtl .driver-popover-title,
            .driver-rtl .driver-popover-description {
              text-align: right !important;
            }
            .driver-rtl .driver-popover-footer {
              flex-direction: row-reverse !important;
              justify-content: flex-start !important;
            }
            .driver-rtl .driver-popover-progress-text {
              display: none !important;
            }
            .driver-rtl .driver-popover-navigation-btns {
              display: flex !important;
              flex-direction: row-reverse !important;
              gap: 0.5rem !important;
            }
          `}} />

          <FloatingHelpButton />
          <InstallPrompt />

          {/* Header Section */}
          <div id="tour-header" className="glass-panel rounded-3xl p-8 mb-8 text-center relative overflow-hidden animate-fade">
            <div className="absolute top-0 right-0 w-64 h-64 bg-islamic-gold/10 rounded-full blur-3xl -mx-20 -my-20 pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>

            <i data-lucide="book-open" className="w-12 h-12 text-islamic-gold mx-auto mb-4 opacity-80"></i>
            <h1 className={`text-4xl md:text-5xl font-bold text-white ${headerFontClass}`}>
              {student.name}
            </h1>
          </div>

          {/* Current Month Box Above Calendar */}
          <div id="tour-month" className="glass-panel rounded-2xl p-4 md:p-6 mb-4 flex flex-col items-center justify-center animate-fade delay-1">
            <h2 className={`text-2xl font-bold text-islamic-light flex items-center gap-3 ${headerFontClass}`}>
              <i data-lucide="calendar-days" className="w-6 h-6 text-islamic-gold"></i>
              {currentMonthNames[month]} {toArabicNums(year)}
            </h2>
          </div>

          {/* Calendar Section */}
          <div id="tour-calendar" className="glass-panel rounded-3xl p-6 md:p-8 animate-fade delay-[500ms] mb-8">
            <h2 className={`text-xl md:text-2xl font-semibold mb-6 text-center text-white flex items-center justify-center gap-3 ${headerFontClass}`}>
              {t.monthlySchedule}
            </h2>

            <div className="grid grid-cols-7 gap-2 md:gap-4 mb-2">
              {currentWeekDays.map(day => (
                <div key={day} className={`text-center font-bold text-slate-400 text-sm py-2 ${headerFontClass}`}>
                  {day}
                </div>
              ))}
            </div>

            <div className="grid grid-cols-7 gap-2 md:gap-4 overflow-visible">
              {paddingDays.map((_, i) => <div key={`pad-${i}`}></div>)}
              {monthDays.map(day => renderDay(day))}
            </div>

            <div className="mt-8 flex flex-wrap justify-center gap-6 text-sm text-slate-400">
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-emerald-400"></div> {t.present}
              </div>
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-red-400"></div> {t.absent}
              </div>
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-amber-400"></div> {t.compensated}
              </div>
              <div className="flex items-center gap-2">
                <div className="w-4 h-4 rounded-full border border-dashed border-islamic-gold/50"></div> {t.scheduled}
              </div>
              <div className="flex items-center gap-2">
                <div className="w-4 h-4 rounded-full bg-islamic-gold text-islamic-900 flex items-center justify-center"><i data-lucide="file-text" className="w-2.5 h-2.5"></i></div> {t.reportAvailable}
              </div>
            </div>
          </div>

          <div id="tour-stats" className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            {/* Attendance Stat */}
            <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center animate-fade delay-2 relative overflow-hidden">
              <div className="absolute inset-0 bg-gradient-to-br from-emerald-500/10 to-transparent"></div>
              <p className={`text-slate-400 tracking-widest mb-1 z-10 ${isArabic ? 'text-base font-bold' : 'text-sm uppercase'}`}>{t.classesAttended}</p>
              <h3 className={`text-5xl font-light text-emerald-400 z-10 ${isArabic ? 'font-sans' : ''}`}>{toArabicNums(presentCount)}</h3>
            </div>

            {/* Absences Stat */}
            <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center animate-fade delay-[400ms] relative overflow-hidden">
              <div className="absolute inset-0 bg-gradient-to-br from-red-500/5 to-transparent"></div>
              <p className={`text-slate-400 tracking-widest mb-1 z-10 ${isArabic ? 'text-base font-bold' : 'text-sm uppercase'}`}>{t.missedClasses}</p>
              <h3 className={`text-5xl font-light text-red-400 z-10 ${isArabic ? 'font-sans' : ''}`}>{toArabicNums(absentCount)}</h3>
            </div>
          </div>

          {/* Action Links */}
          {(student.zoomLink || scheduleLink) && (
            <div id="tour-actions" className={`grid gap-4 md:gap-6 mb-8 animate-fade delay-[600ms] ${student.zoomLink && scheduleLink ? 'grid-cols-1 md:grid-cols-2' : 'grid-cols-1'}`}>
              {student.zoomLink && (
                <a
                  href={student.zoomLink}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="glass-panel rounded-2xl p-4 md:p-6 flex flex-col items-center justify-center gap-3 hover:bg-emerald-900/40 transition-all group active:scale-95 border-emerald-500/20 hover:border-emerald-500/50 hover:shadow-[0_0_20px_rgba(16,185,129,0.2)]"
                >
                  <div className="w-12 h-12 md:w-14 md:h-14 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:rotate-3 transition-transform shadow-inner">
                    <i data-lucide="video" className="w-6 h-6 md:w-7 md:h-7"></i>
                  </div>
                  <span className={`font-bold text-white tracking-widest ${isArabic ? 'text-lg' : 'text-sm md:text-base uppercase'}`}>{t.joinClass}</span>
                </a>
              )}

              {scheduleLink && (
                <a
                  href={scheduleLink}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="glass-panel rounded-2xl p-4 md:p-6 flex flex-col items-center justify-center gap-3 hover:bg-amber-900/30 transition-all group active:scale-95 border-amber-500/20 hover:border-amber-500/50 hover:shadow-[0_0_20px_rgba(245,158,11,0.2)]"
                >
                  <div className="w-12 h-12 md:w-14 md:h-14 bg-amber-500/20 text-amber-400 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:-rotate-3 transition-transform shadow-inner">
                    <i data-lucide="calendar-plus" className="w-6 h-6 md:w-7 md:h-7"></i>
                  </div>
                  <span className={`font-bold text-white tracking-widest ${isArabic ? 'text-lg' : 'text-sm md:text-base uppercase'}`}>{t.scheduleClass}</span>
                </a>
              )}
            </div>
          )}

          {/* Report Modal */}
          {selectedReport && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div id="tour-report-modal-content" className="glass-panel w-full max-w-lg rounded-3xl p-4 md:p-6 relative animate-fade border border-islamic-gold/30 shadow-[0_0_30px_rgba(217,119,6,0.1)]">
                <div className="absolute top-0 right-0 w-32 h-32 bg-islamic-gold/10 rounded-bl-full z-0 pointer-events-none blur-xl"></div>
                <button
                  onClick={() => setSelectedReport(null)}
                  className={`absolute top-3 ${isArabic ? 'left-3' : 'right-3'} text-slate-400 hover:text-white transition-colors z-[100] bg-slate-900/50 hover:bg-slate-800 rounded-full w-10 h-10 flex items-center justify-center shadow-lg`}
                >
                  <i data-lucide="x" className="w-5 h-5"></i>
                </button>

                <div className="relative z-10 text-center mb-3 md:mb-6">
                  <div className="hidden md:inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-500/20 text-emerald-400 mb-3 border border-emerald-500/30 shadow-[0_0_15px_rgba(52,211,153,0.3)]">
                    <i data-lucide="award" className="w-6 h-6"></i>
                  </div>
                  <h3 className={`text-base md:text-2xl font-bold text-islamic-light border-b border-islamic-gold/20 pb-2 md:pb-4 ${headerFontClass}`}>
                    {t.dailyReport}
                  </h3>
                  <p className="text-xs md:text-sm text-emerald-200 mt-1 md:mt-2">
                    {isArabic
                      ? `${toArabicNums(selectedReport.day)} ${currentMonthNames[month]} ${toArabicNums(year)}`
                      : `${currentMonthNames[month]} ${selectedReport.day}, ${year}`}
                  </p>
                </div>

                <div className="space-y-2 max-h-[65vh] md:max-h-[55vh] overflow-y-auto custom-scrollbar pr-2 relative z-10 pb-4">
                  {(() => {
                    const parsed = parseReport(selectedReport.text);
                    // Filter out any accidentally lingering 'Summary' just in case
                    const validSections = parsed.filter(s => s.title !== 'Summary');

                    const classwork = validSections.filter(s => s.type === 'classwork');
                    const homework = validSections.filter(s => s.type === 'homework');
                    const feedback = validSections.filter(s => s.type === 'feedback');
                    const other = validSections.filter(s => s.type === 'other');
                    const audio = validSections.filter(s => s.type === 'audio');

                    return (
                      <>
                        {renderSectionGroup(classwork, "text-emerald-500/70", "border-emerald-500/40", t.completedInClass, isTourMode ? "tour-completed" : undefined)}
                        {renderSectionGroup(homework, "text-amber-500/70", "border-amber-500/40", t.homeworkNextClass, isTourMode ? "tour-homework" : undefined)}
                        {renderSectionGroup(feedback, "text-blue-400/70", "border-blue-500/40", t.feedbackNotes, isTourMode ? "tour-feedback" : undefined)}
                        {renderSectionGroup(other, "text-slate-400/50", "border-slate-500/30", t.otherDetails)}
                        {audio.length > 0 && (
                          <div id={isTourMode ? "tour-audio" : undefined} className="mt-4 pt-4 border-t border-islamic-gold/10">
                            <h5 className="text-[10px] uppercase font-bold tracking-widest mb-3 flex items-center gap-2 text-slate-400/60">
                              <div className="h-px flex-1 bg-current opacity-20"></div>
                              {t.audio}
                              <div className="h-px flex-1 bg-current opacity-20"></div>
                            </h5>
                            <div className="space-y-2">
                              {audio.map((s, idx) => {
                                const url = s.content?.trim();
                                const label = s.title.replace(/🎧/g, '').trim();
                                return url ? (
                                  <a
                                    key={idx}
                                    href={url}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="flex items-center gap-3 p-3 rounded-2xl bg-slate-800/50 border border-slate-600/20 hover:border-islamic-gold/40 hover:bg-slate-700/40 transition-all duration-300 group"
                                  >
                                    <div className="relative w-9 h-9 flex-shrink-0">
                                      <div className="absolute inset-0 rounded-full bg-islamic-gold/25 animate-ping group-hover:animate-none"></div>
                                      <div className="relative w-full h-full rounded-full bg-islamic-gold/10 border border-islamic-gold/20 flex items-center justify-center text-islamic-gold group-hover:bg-islamic-gold/20 transition-colors">
                                        <i data-lucide="headphones" className="w-4 h-4"></i>
                                      </div>
                                    </div>
                                    <div className="flex-1 min-w-0">
                                      <p className="text-xs text-slate-300 font-medium group-hover:text-white transition-colors">{label || t.audioRecording}</p>
                                    </div>
                                    <i data-lucide="external-link" className="w-4 h-4 text-slate-500 group-hover:text-islamic-gold transition-colors flex-shrink-0"></i>
                                  </a>
                                ) : null;
                              })}
                            </div>
                          </div>
                        )}
                      </>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    } // End App

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(req => console.log('Service Worker Registered!'))
          .catch(err => console.error('Service Worker Registration Failed:', err));
      });
    }
  </script>
</body>

</html>
