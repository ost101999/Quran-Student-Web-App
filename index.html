  <!-- Dynamic PWA Manifest: sets start_url to current student path -->
  <script>
    (function () {
      var currentPath = window.location.pathname + window.location.search;
      if (currentPath === '/' || currentPath === '') currentPath = '/';
      var manifest = {
        name: 'Quran Classes Portal',
        short_name: 'Quran Classes',
        description: 'Student Web Portal for Tracking Quran Classes',
        start_url: currentPath,
        display: 'standalone',
        background_color: '#022c22',
        theme_color: '#064e3b',
        icons: [
          { src: '/icon.svg', sizes: '192x192', type: 'image/svg+xml', purpose: 'any' },
          { src: '/icon.svg', sizes: '512x512', type: 'image/svg+xml', purpose: 'any' }
        ]
      };
      var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
    })();

    // Catch PWA Prompt early
    window.pwaDeferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.pwaDeferredPrompt = e;
      window.dispatchEvent(new Event('pwaPromptReady'));
    });
  </script>

<body class="text-slate-100 font-sans min-h-screen relative">
  <!-- Custom user-provided background layer -->
  <div class="fixed inset-0 z-[-1] opacity-10"
    style="background-image: url('./bg.png'); background-size: 20%; background-repeat: repeat; background-position: center;">
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const STATUS = {
      PRESENT: '1',
      PAID_ABSENCE: '!',
      DOUBLE_CLASS: '2',
      EXTRA_DOUBLE: 'ed',
      EXTRA_DAY: 'e',
      ABSENCE_RED: '0',
      UNEXCUSED_ABSENCE: '-',
      POSTPONED: 'p',
      EXEMPT: 'x'
    };

    const monthNames = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    const SMART_TAJWEED_REFERENCE = [
      { id: 'tajweed-foundation', ar: 'النون والميم المشددتان', en: 'stressed noon and meem' },
      { id: 'tajweed-nun-izhar', ar: 'الإظهار الحلقي', en: 'izhar halqi' },
      { id: 'tajweed-nun-idgham', ar: 'الإدغام', en: 'idgham' },
      { id: 'tajweed-nun-iqlab', ar: 'الإقلاب', en: 'iqlab' },
      { id: 'tajweed-nun-ikhfa', ar: 'الإخفاء الحقيقي', en: 'ikhfa haqiqi' },
      { id: 'tajweed-meem-ikhfa', ar: 'الإخفاء الشفوي', en: 'ikhfa shafawi' },
      { id: 'tajweed-meem-idgham', ar: 'الإدغام الشفوي', en: 'idgham shafawi' },
      { id: 'tajweed-meem-izhar', ar: 'الإظهار الشفوي', en: 'izhar shafawi' }
    ];

    const API_BASE = 'https://quran-classes-tracker-default-rtdb.firebaseio.com';

    const parseReport = (text) => {
      if (!text) return [];
      const lines = text.split('\n');
      const sections = [];

      let currentTitle = 'Summary';
      let currentContent = [];

      const keywords = [
        { id: 'new', type: 'classwork', match: ['new', 'الجديد', 'الحفظ'], icon: 'sparkles' },
        { id: 'quran', type: 'classwork', match: ['quran', 'قرآن', 'القرآن', 'recitation'], icon: 'check-circle-2' },
        { id: 'tajweed', type: 'tajweed', match: ['tajweed', 'التجويد', 'تجويد'], icon: 'graduation-cap' },
        { id: 'reading', type: 'classwork', match: ['reading', 'قراءة', 'تلاوة', 'التلاوة', 'قرائية'], icon: 'check-circle-2' },
        { id: 'old_revision', type: 'classwork', match: ['old', 'قديم', 'بعيد', 'ماضي'], icon: 'check-circle-2' },
        { id: 'revision', type: 'classwork', match: ['revision', 'مراجعة', 'المراجعة'], icon: 'check-circle-2' },
        { id: 'noor', type: 'classwork', match: ['noor', 'نور', 'bayan', 'بيان'], icon: 'check-circle-2' },
        { id: 'islamic', type: 'classwork', match: ['islamic', 'اسلامية', 'إسلامية'], icon: 'check-circle-2' },
        { id: 'arabic', type: 'classwork', match: ['arabic'], icon: 'book' },
        { id: 'homework', type: 'homework', match: ['homework', 'واجب', 'الواجب', 'next', 'القادم', 'ما سيتم', 'سيتم'], icon: 'pen-tool' },
        { id: 'feedback', type: 'feedback', match: ['behavior', 'سلوك', 'السلوك'], icon: 'star' },
        { id: 'note', type: 'feedback', match: ['note', 'ملاحظة', 'ملاحظات'], icon: 'message-square' },
        { id: 'audio', type: 'audio', match: ['🎧', 'للاستماع', 'audio correction'], icon: 'headphones' }
      ];

      // Track repeated titles: same title twice → second becomes homework
      const seenTitles = new Set();

      const getSectionMeta = (title) => {
        const lowerT = title.toLowerCase().trim();
        for (const kw of keywords) {
          if (kw.match.some(m => lowerT.includes(m))) {
            if (kw.type === 'classwork') {
              if (seenTitles.has(lowerT)) return { icon: 'pen-tool', type: 'homework' };
              seenTitles.add(lowerT);
              return { icon: kw.icon, type: 'classwork' };
            }
            return { icon: kw.icon, type: kw.type };
          }
        }
        // Unknown section — also tracks repetition
        if (seenTitles.has(lowerT)) return { icon: 'pen-tool', type: 'homework' };
        seenTitles.add(lowerT);
        return { icon: 'file-text', type: 'other' };
      };

      let currentArabicSubject = null;

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i].replace(/\*/g, '').replace(/_/g, '').replace(/〰️/g, '').replace(/ـ/g, '').trim();
        if (/^[-]+$/.test(line)) continue;
        if (!line) continue;

        // Extract subject name from 📚/📖 (SubjectName) emoji headers, then skip
        if (line.includes('📚') || line.includes('📖')) {
          const subjectMatch = line.match(/\(([^)]+)\)/);
          if (subjectMatch) currentArabicSubject = subjectMatch[1].trim();
          continue;
        }

        // Hide redundant header text
        if (
          line.toLowerCase().includes('(arabic)') ||
          line.toLowerCase().startsWith('student:') ||
          line.startsWith('الطالب:') ||
          line.toLowerCase().startsWith('date:') ||
          line.startsWith('التاريخ:') ||
          line.toLowerCase().includes('class report') ||
          line.includes('تقرير الحصة')
        ) {
          continue;
        }

        // Section matching
        if (line.includes(':')) {
          const parts = line.split(':');
          let potentialTitle = parts[0].replace(/^[•\-\s]+/, '').trim();

          // Intercept specific English headers to unify them under 'Arabic'
          if (potentialTitle.toLowerCase().includes('session summary') || potentialTitle.toLowerCase().includes('next session plan')) {
            potentialTitle = 'Arabic';
          }

          // Intercept Arabic book sub-sections (إنجاز الحصة / حصتنا القادمة) → use parent subject as title
          if (currentArabicSubject && (
            potentialTitle.includes('إنجاز') ||
            potentialTitle.includes('حصتنا') ||
            potentialTitle.includes('القادمة')
          )) {
            potentialTitle = currentArabicSubject;
          }

          let isSectionHeader = false;
          for (const kw of keywords) {
            if (kw.match.some(m => potentialTitle.toLowerCase().includes(m))) {
              isSectionHeader = true;
              break;
            }
          }

          if (isSectionHeader) {
            if (currentContent.length > 0 && currentTitle !== 'Summary') {
              const meta = getSectionMeta(currentTitle);
              sections.push({ title: currentTitle, content: currentContent.join('\n').trim(), ...meta });
            }
            currentTitle = potentialTitle;
            const contentAfter = parts.slice(1).join(':').trim();
            currentContent = contentAfter ? [contentAfter] : [];
            continue;
          }
        }
        currentContent.push(line);
      }

      if (currentContent.length > 0 && currentTitle !== 'Summary') {
        const meta = getSectionMeta(currentTitle);
        sections.push({ title: currentTitle, content: currentContent.join('\n').trim(), ...meta });
      }

      const filteredSections = [];
      let sawTajweedInCompleted = false;
      for (const section of sections) {
        if (section.type === 'tajweed') {
          // Keep only the first Tajweed occurrence (the completed part), hide the upcoming one.
          if (sawTajweedInCompleted) continue;
          sawTajweedInCompleted = true;
        }
        filteredSections.push(section);
      }

      return filteredSections.length > 0 ? filteredSections : [{ title: 'Report Overview', content: text.replace(/〰️/g, ''), icon: 'file-text', type: 'other' }];
    };

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [selectedReport, setSelectedReport] = useState(null);
      const [selectedTajweedQuiz, setSelectedTajweedQuiz] = useState(null);
      const [showTajweedRoadmapPage, setShowTajweedRoadmapPage] = useState(false);
      const [roadmapAutoStartEnabled, setRoadmapAutoStartEnabled] = useState(false);
      const [roadmapAutoStartCountdown, setRoadmapAutoStartCountdown] = useState(0);
      const [expandedRoadmapLessonId, setExpandedRoadmapLessonId] = useState('');
      const [quizDraftAnswers, setQuizDraftAnswers] = useState({});
      const [quizValidationErrors, setQuizValidationErrors] = useState({});
      const [quizStatusMessage, setQuizStatusMessage] = useState('');
      const [isQuizSubmitting, setIsQuizSubmitting] = useState(false);
      const [recordingQuestionKey, setRecordingQuestionKey] = useState(null);
      const [showSchedule, setShowSchedule] = useState(false);
      const [glowReportDay, setGlowReportDay] = useState(null);
      const [tick, setTick] = useState(0); // updates every minute for countdown

      const mediaRecorderRef = useRef(null);
      const streamRef = useRef(null);
      const chunksRef = useRef([]);
      const recordingMetaRef = useRef(null);
      const quizScrollRef = useRef(null);
      const roadmapPageScrollRef = useRef(null);

      // Tour state
      const [isTourMode, setIsTourMode] = useState(false);

      // Month navigation: defaults to actual current date (month is 0-indexed like Firebase)
      const _rnow = new Date();
      const [selectedMonth, setSelectedMonth] = useState(_rnow.getMonth());
      const [selectedYear, setSelectedYear] = useState(_rnow.getFullYear());

      const searchParams = new URLSearchParams(window.location.search);
      const studentId = searchParams.get('student');
      // Name-based routing: /ahmed-hassan takes priority over ?student=ID
      const nameSlug = window.location.pathname.replace(/^\//, '').toLowerCase().trim();

      const [studentList, setStudentList] = useState(null);

      useEffect(() => {
        const fetchData = async () => {
          if (!studentId && !nameSlug) {
            setError('Invalid student link. Please check the URL.');
            setLoading(false);
            return;
          }

          try {
            const response = await axios.get(`${API_BASE}/appState.json`);
            setData(response.data);
          } catch (err) {
            console.error(err);
            setError('Failed to load data. Please try again later.');
          } finally {
            setLoading(false);
          }
        };

        fetchData();
      }, [studentId]);

      // Update tick every minute so countdown re-renders
      useEffect(() => {
        const interval = setInterval(() => setTick(t => t + 1), 60000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        return () => {
          if (mediaRecorderRef.current?.state === 'recording') {
            mediaRecorderRef.current.stop();
          }
          if (streamRef.current) {
            streamRef.current.getTracks().forEach((track) => track.stop());
            streamRef.current = null;
          }
        };
      }, []);

      useEffect(() => {
        if (!loading && window.lucide) {
          window.lucide.createIcons();
        }
      });


      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') {
            setSelectedReport(null);
            closeTajweedQuiz();
            setShowSchedule(false);
          }
        };
        if (selectedReport || selectedTajweedQuiz || showSchedule) {
          window.addEventListener('keydown', handleKeyDown);
        }
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedReport, selectedTajweedQuiz, showSchedule]);

      const toSlug = (name) => {
        if (!name) return '';
        const arabicToLatin = {
          'ا': 'a', 'أ': 'a', 'إ': 'e', 'آ': 'a', 'ب': 'b', 'ت': 't', 'ث': 'th',
          'ج': 'j', 'ح': 'h', 'خ': 'kh', 'د': 'd', 'ذ': 'dh', 'ر': 'r', 'ز': 'z',
          'س': 's', 'ش': 'sh', 'ص': 's', 'ض': 'd', 'ط': 't', 'ظ': 'z', 'ع': 'a',
          'غ': 'gh', 'ف': 'f', 'ق': 'q', 'ك': 'k', 'ل': 'l', 'م': 'm', 'ن': 'n',
          'ه': 'h', 'ة': 'a', 'و': 'w', 'ي': 'y', 'ى': 'a', 'ئ': 'e', 'ؤ': 'o'
        };
        let transliterated = name.toLowerCase().trim();
        for (const [ar, en] of Object.entries(arabicToLatin)) {
          transliterated = transliterated.replace(new RegExp(ar, 'g'), en);
        }
        return transliterated.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      };

      // First, determine the actual student from URL/ID to know the language
      const urlStudent = data?.students ? (nameSlug
        ? data.students.find(s => toSlug(s?.name) === nameSlug)
        : data.students.find(s => String(s.id) === String(studentId))) : null;

      const detectPrimaryNameLanguage = (name) => {
        const fullValue = String(name || '').trim();
        const baseValue = (fullValue.split(/[\(\)\[\]\-|–—|]/)[0] || '').trim() || fullValue;
        const value = baseValue;
        if (!value) return 'ar';

        let arabicCount = 0;
        let englishCount = 0;
        let firstScript = null;

        for (const ch of value) {
          if (/[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/.test(ch)) {
            arabicCount += 1;
            if (!firstScript) firstScript = 'ar';
          } else if (/[A-Za-z]/.test(ch)) {
            englishCount += 1;
            if (!firstScript) firstScript = 'en';
          }
        }

        if (arabicCount === 0 && englishCount === 0) return 'ar';
        if (arabicCount === englishCount && firstScript) return firstScript;
        return arabicCount >= englishCount ? 'ar' : 'en';
      };

      const preferredQuestionLanguage = detectPrimaryNameLanguage(urlStudent?.name);
      const isArabic = preferredQuestionLanguage === 'ar';

      useEffect(() => {
        if (!selectedTajweedQuiz) return;

        const previousOverflow = document.body.style.overflow;
        document.body.style.overflow = 'hidden';

        const handleWheel = (event) => {
          const container = quizScrollRef.current;
          if (!container) return;
          if (container.scrollHeight <= container.clientHeight) return;

          event.preventDefault();
          container.scrollBy({ top: event.deltaY, left: 0, behavior: 'auto' });
        };

        window.addEventListener('wheel', handleWheel, { passive: false });

        return () => {
          window.removeEventListener('wheel', handleWheel);
          document.body.style.overflow = previousOverflow;
        };
      }, [selectedTajweedQuiz]);

      useEffect(() => {
        if (!selectedTajweedQuiz || !showTajweedRoadmapPage) return;

        const container = roadmapPageScrollRef.current;
        if (!container) return;

        let mobileResetTimerId = null;

        const frameId = window.requestAnimationFrame(() => {
          const isMobileViewport = window.matchMedia('(max-width: 767px)').matches;
          if (isMobileViewport) {
            container.scrollTo({ top: 0, behavior: 'auto' });
            mobileResetTimerId = window.setTimeout(() => {
              container.scrollTo({ top: 0, behavior: 'auto' });
            }, 140);
            return;
          }

          const currentLessonEl = container.querySelector('[data-current-roadmap="true"]');
          if (!currentLessonEl) return;

          const top = currentLessonEl.offsetTop - (container.clientHeight / 2) + (currentLessonEl.clientHeight / 2);
          container.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });

      };

      const startTour = () => {
        window.scrollTo({ top: 0, behavior: 'instant' });
        setIsTourMode(true);
        setTimeout(() => {
          if (window.lucide) window.lucide.createIcons();
          setTimeout(() => {
            const driverObj = window.driver.js.driver({
              showProgress: false,
              animate: true,
              nextBtnText: t.next,
              prevBtnText: t.prev,
              doneBtnText: t.done,
              popoverClass: isArabic ? 'driver-rtl' : '',
              overlayColor: 'rgba(0, 0, 0, 0.75)',
              stagePadding: 8,
              stageRadius: 12,
              allowClose: true,
              onDestroyed: () => {
                setIsTourMode(false);
                setSelectedReport(null);
              },
              steps: [
                {
                  element: '#tour-header',
                  popover: {
                    title: t.tourProfileTitle,
                    description: t.tourProfileDesc,
                    side: 'bottom',

                  element: '#tour-month',
                  popover: {
                    title: t.tourMonthTitle,
                    description: t.tourMonthDesc,
                    side: 'bottom',
                    align: 'center'
                  }
                },
                {
                  element: '#tour-calendar',
                  popover: {
                    title: t.tourCalendarTitle,
                    description: t.tourCalendarDesc,
                    side: 'top',
                    align: 'center'
                  }
                },

                  element: '#tour-day-2',
                  popover: {
                    title: t.tourGreenTitle,

                  popover: {

                  },

                  onPrevClick: () => {

                    setTimeout(() => {

                },
                {

                    window.scrollTo({ top: 0, behavior: 'smooth' });

                },
                {
                  element: '#tour-book-session',
                  popover: {
                    title: t.tourBookSessionTitle,
                    description: t.tourBookSessionDesc,
                    side: 'bottom',
                    align: 'center'
                  },
                  onHighlightStarted: () => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                  }
                },
                {
                  element: '#tour-my-schedule',
                  popover: {
                    title: t.tourMyScheduleTitle,
                    description: t.tourMyScheduleDesc,
                    side: 'bottom',
                    align: 'center'

                  onHighlightStarted: () => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });

              ]

            driverObj.drive();
          }, 300);

      };

      const FloatingHelpButton = () => (
        <button
          onClick={startTour}
          className="fixed bottom-6 left-6 z-20 md:z-[100] bg-islamic-800 text-islamic-light p-3 md:p-4 rounded-full shadow-[0_4px_20px_rgba(217,119,6,0.5)] border border-islamic-gold/50 hover:bg-islamic-900 hover:scale-110 transition-all duration-300"
          title="Start Tour"
        >
          <i data-lucide="help-circle" className="w-6 h-6 md:w-8 md:h-8"></i>
        </button>
      );

      const InstallPrompt = () => {
        const [isInstallable, setIsInstallable] = useState(false);
        const [deferredPrompt, setDeferredPrompt] = useState(null);
        const [isIOS, setIsIOS] = useState(false);
        const [showIOSHint, setShowIOSHint] = useState(false);
        const [dismissed, setDismissed] = useState(false);

        useEffect(() => {
          // Check if already installed or dismissed
          const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
          if (isStandalone || localStorage.getItem('pwa_dismissed') === 'true' || localStorage.getItem('pwa_installed') === 'true') {
            return;
          }

          // Always show the prompt if not installed (for UI visibility)
          setIsInstallable(true);

          // Detect iOS
          const objAgent = navigator.userAgent;
          const isIOSDevice = /iPad|iPhone|iPod/.test(objAgent) && !window.MSStream;
          setIsIOS(isIOSDevice);

          // Check if prompt was caught early
          if (window.pwaDeferredPrompt) {
            setDeferredPrompt(window.pwaDeferredPrompt);
          }

          // Listen for the prompt if it fires later
          const handlePwaReady = () => {
            setDeferredPrompt(window.pwaDeferredPrompt);
          };

          window.addEventListener('pwaPromptReady', handlePwaReady);

          // Listen for successful installation
          const handleInstalled = () => {
            localStorage.setItem('pwa_installed', 'true');
            setIsInstallable(false);
          };
          window.addEventListener('appinstalled', handleInstalled);

          return () => {
            window.removeEventListener('pwaPromptReady', handlePwaReady);
            window.removeEventListener('appinstalled', handleInstalled);
          };
        }, []);

        useEffect(() => {
          if (isInstallable && window.lucide) window.lucide.createIcons();
        }, [isInstallable, showIOSHint]);

        if (!isInstallable || dismissed) return null;

        const handleInstallClick = async () => {
          if (isIOS || !deferredPrompt) {
            setShowIOSHint(true);
            return;
          }

          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
              localStorage.setItem('pwa_installed', 'true');
              setIsInstallable(false);
            }
            setDeferredPrompt(null);
            window.pwaDeferredPrompt = null;
          }
        };

        const handleDismiss = () => {
          setDismissed(true);
          localStorage.setItem('pwa_dismissed', 'true');
        };

        return (
          <div className={`fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-96 glass-panel rounded-2xl p-4 shadow-[0_10px_30px_rgba(0,0,0,0.5)] z-[100] border-islamic-gold/30 animate-fade-up ${fontClass}`}>
            <button onClick={handleDismiss} className={`absolute ${isArabic ? 'left-3' : 'right-3'} top-3 text-slate-400 hover:text-white transition-colors`}>
              <i data-lucide="x" className="w-5 h-5"></i>
            </button>
            <div className="flex items-start gap-4">
              <div className="w-12 h-12 bg-islamic-800 rounded-xl flex items-center justify-center flex-shrink-0 border border-islamic-gold/20 shadow-inner">
                <i data-lucide="download" className="w-6 h-6 text-islamic-gold"></i>
              </div>
              <div className="flex-1 pr-6">
                <h4 className="text-white font-bold mb-1">{isArabic ? "تثبيت التطبيق" : "Install App"}</h4>
                <p className="text-xs text-slate-300 mb-3 leading-relaxed">{isArabic ? "قم بتثبيت كشكول الطالب على هاتفك للوصول السريع دائماً." : "Install the student portal on your device for quick access."}</p>
                <button onClick={handleInstallClick} className="bg-emerald-600/90 hover:bg-emerald-500 text-white text-xs font-semibold py-2 px-4 rounded-lg transition-colors w-full shadow-lg border border-emerald-400/20 uppercase tracking-widest">
                  {isArabic ? "تثبيت الآن" : "Install Now"}
                </button>
                {showIOSHint && (
                  <div className="mt-3 p-3 bg-blue-900/40 border border-blue-500/30 rounded-lg text-xs text-blue-200 flex items-start gap-2 animate-fade">
                    <i data-lucide="info" className="w-4 h-4 flex-shrink-0 mt-0.5 text-blue-400"></i>
                    <span>
                      {isIOS
                        ? (isArabic ? "في سفاري: اضغط على زر المشاركة (مربع بداخله سهم) ثم اختر 'إضافة إلى الشاشة الرئيسية'." : "In Safari: Tap Share (square with arrow) and select 'Add to Home'.")
                        : (isArabic ? "للتثبيت في متصفحك: انقر على الثلاث نقاط (القائمة) ثم ابحث عن 'تثبيت التطبيق' أو 'أضف للشاشة'." : "To install: Click your browser menu (three dots) and select 'Install app' or 'Add to Home'.")}
                    </span>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // Render Loading Phase
      if (!isTourMode && loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="animate-spin flex gap-2">
              <div className="w-4 h-4 rounded-full bg-islamic-gold"></div>
              <div className="w-4 h-4 rounded-full bg-islamic-gold"></div>
            </div>
          </div>
        );
      }

      if (!isTourMode && (error || !activeData || !activeData.students)) {
        return (
          <div className={`min-h-screen flex flex-col items-center justify-center p-6 text-center animate-fade ${fontClass}`} dir={isArabic ? 'rtl' : 'ltr'}>
            <i data-lucide="alert-circle" className="text-red-400 mb-4 w-16 h-16"></i>
            <h1 className={`text-2xl font-bold text-white mb-2 ${headerFontClass}`}>{t ? t.errorTitle : 'Error'}</h1>
            <p className="text-slate-400">{error || (t ? t.errorLoad : 'No data found')}</p>
          </div>
        );
      }

      const getScheduleLink = (durationStr) => {
        if (!durationStr) return null;
        const normalized = String(durationStr).replace(/[٠-٩]/g, (d) => "٠١٢٣٤٥٦٧٨٩".indexOf(d).toString()).trim();
        if (normalized === '30') return 'https://zcal.co/i/tYjuo5JV';
        if (normalized === '45') return 'https://zcal.co/i/ThNRhEes';
        if (normalized === '60') return 'https://zcal.co/i/_yKMg4po';
        return null;
      };

      if (!student) {
        return (
          <div className={`min-h-screen flex flex-col items-center justify-center p-6 text-center animate-fade ${fontClass}`} dir={isArabic ? 'rtl' : 'ltr'}>
            <i data-lucide="user-x" className="text-islamic-gold mb-4 w-16 h-16"></i>
            <h1 className={`text-2xl font-bold text-white mb-2 ${headerFontClass}`}>{t ? t.studentNotFound : 'Student Not Found'}</h1>
            <p className="text-slate-400">{t ? t.noRecord : 'There is no record for this student in the system.'}</p>
            <FloatingHelpButton />
          </div>
        );
      }

      const scheduleLink = getScheduleLink(student.duration);

      const tajweedBank = activeData?.tajweedBank || {};
      const tajweedAssignments = activeData?.tajweedAssignments || {};
      const tajweedSubmissions = activeData?.tajweedSubmissions || {};

      const normalizeForMatch = (value) => {
        return String(value || '')
          .toLowerCase()
          .replace(/[ـ]/g, '')
          .replace(/[^a-z0-9\u0600-\u06FF\s]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      };

      const getReferenceCandidatesFromId = (lessonId) => {
        const ref = SMART_TAJWEED_REFERENCE.find(item => item.id === lessonId);
        if (!ref) return [];
        return [ref.ar, ref.en].filter(Boolean);
      };

      const hasQuestions = (lesson) => {
        if (Array.isArray(lesson?.questions) && lesson.questions.length > 0) {
          return true;
        }

        const versions = getLessonExamVersions(lesson);
        return versions.some((version) => Array.isArray(version?.questions) && version.questions.length > 0);
      };

      const getLessonLanguage = (lesson) => {
        const rawLanguage = String(lesson?.language || '').toLowerCase();

        if (rawLanguage === 'both') return 'both';

        const versions = Array.isArray(lesson?.examVersions) ? lesson.examVersions : [];
        if (versions.length > 0) {
          let hasArabic = false;
          let hasEnglish = false;

          versions.forEach((version) => {
            const versionLanguage = String(version?.language || '').toLowerCase();
            if (versionLanguage === 'en') hasEnglish = true;
            else hasArabic = true;
          });

          if (hasArabic && hasEnglish) return 'both';
          if (hasEnglish) return 'en';
          return 'ar';
        }

        if (rawLanguage === 'en') return 'en';
        return 'ar';
      };

      const normalizeAssignmentContentLanguage = (value) => {
        const rawLanguage = String(value || '').toLowerCase().trim();
        if (rawLanguage === 'ar' || rawLanguage === 'en') return rawLanguage;
        return null;
      };

      const getDefaultContentLanguageForLesson = (lesson) => {
        const lessonLanguage = getLessonLanguage(lesson);

        if (Array.isArray(lesson?.examVersions) && lesson.examVersions.length > 0) {
          const hasPreferredLanguageVersion = lesson.examVersions.some((version) => (
            normalizeAssignmentContentLanguage(version?.language) === preferredQuestionLanguage
          ));

          if (hasPreferredLanguageVersion) {
            return preferredQuestionLanguage;
          }
        }

        if (lessonLanguage === 'both') return preferredQuestionLanguage;
        return lessonLanguage;
      };

      const getLessonExamVersions = (lesson) => {
        const versions = Array.isArray(lesson?.examVersions) ? lesson.examVersions : [];
        if (versions.length > 0) return versions;

        return [
          {
            id: `${lesson?.id || Date.now().toString()}-legacy-v1`,
            language: getLessonLanguage(lesson),
            targetAge: lesson?.targetAge || 'all',
            questions: Array.isArray(lesson?.questions) ? lesson.questions : [],
          }
        ];
      };

      const getAssignmentExamVersion = (lesson, assignment) => {
        const versions = getLessonExamVersions(lesson);
        if (versions.length === 0) return null;

        const preferredTargetAge = student?.targetAge === 'kids' || student?.targetAge === 'adults'
          ? student.targetAge
          : null;
        const requestedLanguage = normalizeAssignmentContentLanguage(assignment?.contentLanguage);
        const getVersionLanguage = (version) => (
          normalizeAssignmentContentLanguage(version?.language) || getDefaultContentLanguageForLesson(lesson)
        );
        const getVersionTargetAge = (version) => {
          const versionTargetAge = String(version?.targetAge || '').toLowerCase();
          if (versionTargetAge === 'kids' || versionTargetAge === 'adults' || versionTargetAge === 'all') {
            return versionTargetAge;
          }

          const lessonTargetAge = String(lesson?.targetAge || '').toLowerCase();
          if (lessonTargetAge === 'kids' || lessonTargetAge === 'adults' || lessonTargetAge === 'all') {
            return lessonTargetAge;
          }

          return 'all';
        };
        const matchesLanguage = (version) => {
          if (!requestedLanguage) return true;
          return getVersionLanguage(version) === requestedLanguage;
        };
        const matchesTargetAge = (version) => {
          if (!preferredTargetAge) return true;
          const versionTargetAge = getVersionTargetAge(version);
          return versionTargetAge === 'all' || versionTargetAge === preferredTargetAge;
        };

        const requestedVersionId = String(assignment?.versionId || '').trim();
        if (requestedVersionId) {
          const byId = versions.find((version) => String(version?.id || '').trim() === requestedVersionId);
          if (byId) {
            const hasLanguageMismatch = !!requestedLanguage && getVersionLanguage(byId) !== requestedLanguage;
            const hasTargetAgeMismatch = !!preferredTargetAge
              && getVersionTargetAge(byId) !== 'all'
              && getVersionTargetAge(byId) !== preferredTargetAge;

            if (!hasLanguageMismatch && !hasTargetAgeMismatch) {
              return byId;
            }
          }
        }

        const strict = versions.find((version) => matchesLanguage(version) && matchesTargetAge(version));
        if (strict) return strict;

        const byLanguage = versions.find((version) => matchesLanguage(version));
        if (byLanguage) return byLanguage;

        const byTargetAge = versions.find((version) => matchesTargetAge(version));
        if (byTargetAge) return byTargetAge;

        return versions[0];
      };

      const ROADMAP_GROUP_LABELS = {
        nun: { ar: 'أحكام النون الساكنة والتنوين', en: 'Noon Sakinah & Tanween Rules' },
        meem: { ar: 'أحكام الميم الساكنة', en: 'Meem Sakinah Rules' },
        foundation: { ar: 'دروس تأسيسية', en: 'Foundation Lessons' },
        independent: { ar: 'دروس مستقلة', en: 'Independent Lessons' },
      };

      const ROADMAP_GROUP_ORDER = ['nun', 'meem', 'foundation', 'independent'];

      const normalizeRoadmapGroupKey = (value) => String(value || '').trim().toLowerCase();

      const inferRoadmapGroupFromLesson = (lesson) => {
        const lessonId = String(lesson?.id || '').toLowerCase();
        const lessonTitle = String(lesson?.title || '').toLowerCase();

        if (lessonId.startsWith('tajweed-nun-')) return 'nun';
        if (lessonId.startsWith('tajweed-meem-')) return 'meem';
        if (lessonId.includes('foundation')) return 'foundation';

        if (lessonTitle.includes('نون') || lessonTitle.includes('tanween') || lessonTitle.includes('noon')) return 'nun';
        if (lessonTitle.includes('ميم') || lessonTitle.includes('meem')) return 'meem';
        if (lessonTitle.includes('تأسيس') || lessonTitle.includes('foundation')) return 'foundation';

        return 'independent';
      };

      const getRoadmapLessonGroupKey = (lesson) => {
        const rawGroup = normalizeRoadmapGroupKey(lesson?.group);
        if (rawGroup && rawGroup !== 'other') return rawGroup;
        return inferRoadmapGroupFromLesson(lesson);
      };

      const getRoadmapLessonGroupLabel = (groupKey) => {
        const normalized = normalizeRoadmapGroupKey(groupKey);
        const labels = ROADMAP_GROUP_LABELS[normalized];
        if (labels) return isArabic ? labels.ar : labels.en;
        return groupKey || (isArabic ? ROADMAP_GROUP_LABELS.independent.ar : ROADMAP_GROUP_LABELS.independent.en);
      };

      const pickFirstResourceUrl = (candidates) => {
        for (const candidate of candidates) {
          const value = String(candidate || '').trim();
          if (!value) continue;
          if (value.startsWith('http://') || value.startsWith('https://')) return value;
        }
        return '';
      };

      const getLessonVideoUrl = (lesson, version) => {
        const hasVersionScopedContent = Array.isArray(lesson?.examVersions) && lesson.examVersions.length > 0;

        if (hasVersionScopedContent) {
          return pickFirstResourceUrl([
            version?.videoUrl,
            version?.videoLink,
            version?.resources?.videoUrl,
            version?.resources?.videoLink,
          ]);
        }

        return pickFirstResourceUrl([
          version?.videoUrl,
          version?.videoLink,
          version?.resources?.videoUrl,
          version?.resources?.videoLink,
          lesson?.videoUrl,
          lesson?.videoLink,
          lesson?.lessonVideoUrl,
          lesson?.explanationVideoUrl,
          lesson?.resources?.videoUrl,
          lesson?.resources?.videoLink,
        ]);
      };

      const getLessonPdfUrl = (lesson, version) => {
        const hasVersionScopedContent = Array.isArray(lesson?.examVersions) && lesson.examVersions.length > 0;

        if (hasVersionScopedContent) {
          return pickFirstResourceUrl([
            version?.pdfUrl,
            version?.pdfLink,
            version?.resources?.pdfUrl,
            version?.resources?.pdfLink,
            version?.resources?.worksheetUrl,
          ]);
        }

        return pickFirstResourceUrl([
          version?.pdfUrl,
          version?.pdfLink,
          version?.resources?.pdfUrl,
          version?.resources?.pdfLink,
          version?.resources?.worksheetUrl,
          lesson?.pdfUrl,
          lesson?.pdfLink,
          lesson?.lessonPdfUrl,
          lesson?.resources?.pdfUrl,
          lesson?.resources?.pdfLink,
          lesson?.resources?.worksheetUrl,
        ]);
      };

      const formatSubmissionDateTime = (timestamp) => {
        const value = Number(timestamp || 0);
        if (!value) return '-';

        try {
          return new Date(value).toLocaleString(isArabic ? 'ar-EG' : 'en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
          });
        } catch {
          const d = new Date(value);
          return d.toString();
        }
      };

      const getSubmissionAnswerPreview = (attempt) => {
        const answers = Array.isArray(attempt?.answers) ? attempt.answers : [];

        const firstText = answers.find((answer) => String(answer?.answerText || '').trim());
        if (firstText) {
          const value = String(firstText.answerText || '').trim();
          return value.length > 80 ? `${value.slice(0, 80)}...` : value;
        }

        const hasChoice = answers.some((answer) => typeof answer?.selectedOptionIndex === 'number');
        if (hasChoice) {
          return isArabic ? 'تمت إجابة أسئلة الاختيار من متعدد.' : 'Multiple-choice answers were submitted.';
        }

        const hasAudio = answers.some((answer) => String(answer?.audioBase64 || '').trim());
        if (hasAudio) {
          return isArabic ? 'تم رفع إجابة صوتية.' : 'Audio response uploaded.';
        }

        return isArabic ? 'تم تسليم الواجب.' : 'Assignment submitted.';
      };

      const matchesPreferredLessonLanguage = (lesson, targetLanguage = preferredQuestionLanguage) => {
        const lessonLanguage = getLessonLanguage(lesson);
        if (lessonLanguage === 'both' || lessonLanguage === targetLanguage) return true;

        return getLessonExamVersions(lesson).some((version) => (
          normalizeAssignmentContentLanguage(version?.language) === targetLanguage
        ));
      };

      const resolveQuestionTargetLanguage = (requestedLanguage) => {
        const normalizedLanguage = normalizeAssignmentContentLanguage(requestedLanguage);
        if (normalizedLanguage) return normalizedLanguage;
        return preferredQuestionLanguage;
      };

      const getSmartOrderedBankEntries = () => {
        const entries = Object.entries(tajweedBank);
        const ordered = [];
        const usedIds = new Set();

        SMART_TAJWEED_REFERENCE.forEach((ref) => {
          const refs = [ref.ar, ref.en]
            .map((item) => normalizeForMatch(item))
            .filter(Boolean);

          const exact = entries.find(([id, lesson]) => {
            if (usedIds.has(id)) return false;
            const lessonTitle = normalizeForMatch(lesson?.title || '');
            return refs.some((r) => lessonTitle === r);
          });

          const loose = exact ? null : entries.find(([id, lesson]) => {
            if (usedIds.has(id)) return false;
            const lessonTitle = normalizeForMatch(lesson?.title || '');
            return refs.some((r) => lessonTitle && (lessonTitle.includes(r) || r.includes(lessonTitle)));
          });

          const picked = exact || loose;
          if (picked) {
            usedIds.add(picked[0]);
            ordered.push(picked);
          }
        });

        entries.forEach((entry) => {
          if (!usedIds.has(entry[0])) ordered.push(entry);
        });

        return ordered;
      };

      const getLessonTitleSearchKeys = (lesson, preferredVersion = null) => {
        const keys = [];

        const pushKey = (value) => {
          const normalized = normalizeForMatch(value || '');
          if (!normalized) return;
          if (!keys.includes(normalized)) keys.push(normalized);
        };

        pushKey(lesson?.title);

        if (preferredVersion) {
          pushKey(preferredVersion?.lessonTitle);
        }

        getLessonExamVersions(lesson).forEach((version) => {
          pushKey(version?.lessonTitle);
        });

        return keys;
      };

      const doesHintMatchLesson = (hint, lesson, preferredVersion = null) => {
        const normalizedHint = normalizeForMatch(hint || '');
        if (!normalizedHint) return false;

        const titleKeys = getLessonTitleSearchKeys(lesson, preferredVersion);
        return titleKeys.some((key) => (
          key === normalizedHint || key.includes(normalizedHint) || normalizedHint.includes(key)
        ));
      };

      const resolveBankLessonForAssignment = (assignment) => {
        if (!assignment) return null;

        const direct = tajweedBank[assignment.lessonId];
        if (direct) {
          return { lessonId: assignment.lessonId, lesson: direct };
        }

        const assignmentLanguage = normalizeAssignmentContentLanguage(assignment?.contentLanguage)
          || preferredQuestionLanguage;

        const referenceTitles = getReferenceCandidatesFromId(assignment.lessonId);
        const searchTitles = referenceTitles.length > 0 ? referenceTitles : [];
        if (searchTitles.length === 0) {
          return null;
        }

        const entries = getSmartOrderedBankEntries();

        for (const refTitle of searchTitles) {
          const refNorm = normalizeForMatch(refTitle);
          const exact = entries.find(([_, lesson]) => {
            if (!matchesPreferredLessonLanguage(lesson, assignmentLanguage)) {
              return false;
            }

            return getLessonTitleSearchKeys(lesson).some((key) => key === refNorm);
          });
          if (exact) return { lessonId: exact[0], lesson: exact[1] };
        }

        for (const refTitle of searchTitles) {
          const refNorm = normalizeForMatch(refTitle);
          const loose = entries.find(([_, lesson]) => {
            if (!matchesPreferredLessonLanguage(lesson, assignmentLanguage)) {
              return false;
            }

            return getLessonTitleSearchKeys(lesson).some((key) => (
              key && (key.includes(refNorm) || refNorm.includes(key))
            ));
          });
          if (loose) return { lessonId: loose[0], lesson: loose[1] };
        }

        for (const refTitle of searchTitles) {
          const refNorm = normalizeForMatch(refTitle);
          const exact = entries.find(([_, lesson]) => {
            const lessonNorm = normalizeForMatch(lesson?.title || '');
            return lessonNorm === refNorm;
          });
          if (exact) return { lessonId: exact[0], lesson: exact[1] };
        }

        for (const refTitle of searchTitles) {
          const refNorm = normalizeForMatch(refTitle);
          const loose = entries.find(([_, lesson]) => {
            const lessonNorm = normalizeForMatch(lesson?.title || '');
            return lessonNorm
              && (lessonNorm.includes(refNorm) || refNorm.includes(lessonNorm));
          });
          if (loose) return { lessonId: loose[0], lesson: loose[1] };
        }

        return null;
      };

      const resolveBankLessonFromSection = (section) => {
        const firstLine = String(section?.content || '').split('\n').find(Boolean) || '';
        const hint = normalizeForMatch(`${section?.title || ''} ${firstLine}`);
        if (!hint) return null;

        const entries = getSmartOrderedBankEntries();

        const matches = entries.filter(([_, lesson]) => {
          return doesHintMatchLesson(hint, lesson);
        });

        const preferred = matches.find(([_, lesson]) => matchesPreferredLessonLanguage(lesson));
        if (preferred) return { lessonId: preferred[0], lesson: preferred[1] };

        if (matches.length > 0) return { lessonId: matches[0][0], lesson: matches[0][1] };

        return null;
      };

      const pendingTajweedAssignments = Object.values(tajweedAssignments)
        .filter((assignment) => assignment && assignment.studentId === student.id && assignment.status === 'pending')
        .sort((a, b) => Number(b?.assignedAt || 0) - Number(a?.assignedAt || 0))
        .map((assignment) => {
          const resolved = resolveBankLessonForAssignment(assignment);
          if (!resolved) return null;

          const resolvedVersion = getAssignmentExamVersion(resolved.lesson, assignment);
          const resolvedQuestions = Array.isArray(resolvedVersion?.questions)
            ? resolvedVersion.questions
            : (Array.isArray(resolved.lesson?.questions) ? resolved.lesson.questions : []);
          const resolvedVersionLanguage = normalizeAssignmentContentLanguage(resolvedVersion?.language)
            || getDefaultContentLanguageForLesson(resolved.lesson);

          return {
            ...assignment,
            contentLanguage: normalizeAssignmentContentLanguage(assignment?.contentLanguage) || resolvedVersionLanguage,
            resolvedLessonId: resolved.lessonId,
            resolvedLesson: resolved.lesson,
            resolvedVersion,
            resolvedVersionId: resolvedVersion?.id,
            resolvedVersionLanguage,
            resolvedQuestions,
          };
        })
        .filter(Boolean);

      const studentSolvedLessonsState = (() => {
        const byLessonId = new Map();
        const byLessonTitle = new Map();
        const allSubmissions = Object.values(tajweedSubmissions || {}).filter(Boolean);
        const studentIdKey = String(student?.id || '');

        const mergeState = (targetMap, targetKey, payload) => {
          if (!targetKey) return;

          const previous = targetMap.get(targetKey) || {
            isSolved: false,
            latestSolvedAt: 0,
            attempts: [],
          };

          targetMap.set(targetKey, {
            isSolved: previous.isSolved || payload.isSolved,
            latestSolvedAt: Math.max(Number(previous.latestSolvedAt || 0), Number(payload.latestSolvedAt || 0)),
            attempts: [...previous.attempts, ...(Array.isArray(payload.attempts) ? payload.attempts : [])],
          });
        };

        Object.values(tajweedAssignments || {}).forEach((assignment) => {
          if (!assignment || String(assignment?.studentId || '') !== studentIdKey) return;

          const resolved = resolveBankLessonForAssignment(assignment);
          if (!resolved?.lesson) return;

          const assignmentId = String(assignment?.id || '').trim();
          const lessonIdKey = String(resolved.lessonId || assignment.lessonId || '').trim();
          const lessonTitleKey = normalizeForMatch(resolved.lesson?.title || '');

          const attemptsMap = new Map();
          const explicitSubmissionId = String(assignment?.submissionId || '').trim();

          if (explicitSubmissionId) {
            const explicitSubmission = tajweedSubmissions[explicitSubmissionId];
            if (explicitSubmission && String(explicitSubmission?.studentId || '') === studentIdKey) {
              attemptsMap.set(String(explicitSubmission?.id || explicitSubmissionId), explicitSubmission);
            }
          }

          if (assignmentId) {
            allSubmissions.forEach((submission) => {
              if (String(submission?.studentId || '') !== studentIdKey) return;
              if (String(submission?.assignmentId || '') !== assignmentId) return;

              const submissionId = String(submission?.id || `${assignmentId}_${submission?.submittedAt || 0}`);
              attemptsMap.set(submissionId, submission);
            });
          }

          const attempts = Array.from(attemptsMap.values())
            .map((submission, index) => ({
              id: String(submission?.id || `${assignmentId}_${submission?.submittedAt || 0}_${index}`),
              assignmentId,
              submittedAt: Number(submission?.submittedAt || 0),
              answers: Array.isArray(submission?.answers) ? submission.answers : [],
            }))
            .sort((a, b) => Number(b.submittedAt || 0) - Number(a.submittedAt || 0));

          const isSolved = String(assignment?.status || '').toLowerCase() === 'submitted' || attempts.length > 0;
          if (!isSolved) return;

          const latestSolvedAt = Math.max(
            Number(assignment?.updatedAt || 0),
            Number(assignment?.assignedAt || 0),
            ...(attempts.length > 0 ? attempts.map((attempt) => Number(attempt?.submittedAt || 0)) : [0]),
          );

          const payload = {
            isSolved,
            latestSolvedAt,
            attempts,
          };

          mergeState(byLessonId, lessonIdKey, payload);
          mergeState(byLessonTitle, lessonTitleKey, payload);
        });

        [byLessonId, byLessonTitle].forEach((targetMap) => {
          targetMap.forEach((entry, key) => {
            const dedupedAttempts = new Map();
            (entry.attempts || []).forEach((attempt, attemptIndex) => {
              const attemptId = String(attempt?.id || `${key}_${attempt?.submittedAt || 0}_${attemptIndex}`);
              dedupedAttempts.set(attemptId, {
                ...attempt,
                id: attemptId,
              });
            });

            const attempts = Array.from(dedupedAttempts.values())
              .sort((a, b) => Number(b?.submittedAt || 0) - Number(a?.submittedAt || 0));

            targetMap.set(key, {
              isSolved: !!entry.isSolved || attempts.length > 0,
              latestSolvedAt: Math.max(Number(entry.latestSolvedAt || 0), Number(attempts[0]?.submittedAt || 0)),
              attempts,
            });
          });
        });

        return { byLessonId, byLessonTitle };
      })();

      const getStudentSolvedLessonState = (lesson, lessonIdHint = '') => {
        const byId = String(lessonIdHint || lesson?.id || '').trim();
        if (byId && studentSolvedLessonsState.byLessonId.has(byId)) {
          return studentSolvedLessonsState.byLessonId.get(byId);
        }

        const byTitle = normalizeForMatch(lesson?.title || '');
        if (byTitle && studentSolvedLessonsState.byLessonTitle.has(byTitle)) {
          return studentSolvedLessonsState.byLessonTitle.get(byTitle);
        }

        return null;
      };

      const findMatchingPendingTajweedAssignment = (section) => {
        if (!pendingTajweedAssignments.length) return null;

        const firstLine = String(section?.content || '').split('\n').find(Boolean) || '';
        const hint = normalizeForMatch(`${section?.title || ''} ${firstLine}`);

        if (!hint) return pendingTajweedAssignments[0];

        const matched = pendingTajweedAssignments.find((assignment) => {
          return doesHintMatchLesson(hint, assignment?.resolvedLesson, assignment?.resolvedVersion || null);
        });

        return matched || pendingTajweedAssignments[0];
      };

      const normalizeQuestionType = (question) => {
        const rawType = String(question?.type || '').toLowerCase();
        if (rawType === 'multiple_choice' || rawType.includes('multiple')) return 'multiple_choice';
        if (rawType === 'audio' || rawType.includes('voice') || rawType.includes('mic')) return 'audio';
        if (Array.isArray(question?.options) && question.options.length > 0) return 'multiple_choice';
        return 'text';
      };

      const detectContentLanguage = (value) => {
        const text = String(value || '').trim();
        if (!text) return null;

        const arabicMatches = text.match(/[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/g) || [];
        const englishMatches = text.match(/[A-Za-z]/g) || [];

        if (arabicMatches.length === 0 && englishMatches.length === 0) return null;
        return arabicMatches.length >= englishMatches.length ? 'ar' : 'en';
      };

      const pickLocalizedText = (orderedValues, targetLanguage) => {
        const values = orderedValues
          .map((item) => String(item || '').trim())
          .filter(Boolean);

        if (!values.length) return '-';

        const exact = values.find((value) => detectContentLanguage(value) === targetLanguage);
        if (exact) return exact;

        const neutral = values.find((value) => detectContentLanguage(value) === null);
        if (neutral) return neutral;

        return values[0];
      };

      const pickLocalizedOptions = (orderedOptionSets, targetLanguage) => {
        const optionSets = orderedOptionSets
          .map((set) => (Array.isArray(set)
            ? set.map((item) => String(item ?? '').trim()).filter(Boolean)
            : []))
          .filter((set) => set.length > 0);

        if (!optionSets.length) return [];

        const scoreSet = (set) => {
          let withLanguage = 0;
          let targetHits = 0;

          set.forEach((option) => {
            const optionLanguage = detectContentLanguage(option);
            if (!optionLanguage) return;
            withLanguage += 1;
            if (optionLanguage === targetLanguage) targetHits += 1;
          });

          if (withLanguage === 0) return 0;
          return targetHits / withLanguage;
        };

        let best = optionSets[0];
        let bestScore = scoreSet(best);

        optionSets.forEach((set) => {
          const score = scoreSet(set);
          if (score > bestScore) {
            best = set;
            bestScore = score;
          }
        });

        return best;
      };

      const getLocalizedQuizQuestionText = (question, requestedLanguage) => {
        const targetLanguage = resolveQuestionTargetLanguage(requestedLanguage);
        const textAr = String(question?.textAr || '').trim();
        const textEn = String(question?.textEn || '').trim();
        const fallback = String(question?.text || '').trim();

        if (targetLanguage === 'en') {
          return pickLocalizedText([textEn, fallback, textAr], 'en');
        }

        return pickLocalizedText([textAr, fallback, textEn], 'ar');
      };

      const getLocalizedQuizQuestionOptions = (question, requestedLanguage) => {
        const targetLanguage = resolveQuestionTargetLanguage(requestedLanguage);
        const cleanArray = (value) => {
          if (!Array.isArray(value)) return [];
          return value.map((item) => String(item ?? '').trim()).filter(Boolean);
        };

        const optionsAr = cleanArray(question?.optionsAr);
        const optionsEn = cleanArray(question?.optionsEn);
        const fallback = cleanArray(question?.options);

        if (targetLanguage === 'en') {
          return pickLocalizedOptions([optionsEn, fallback, optionsAr], 'en');
        }

        return pickLocalizedOptions([optionsAr, fallback, optionsEn], 'ar');
      };

      const getVersionLocalizedLessonTitle = (lesson, version, requestedLanguage = preferredQuestionLanguage) => {
        const targetLanguage = normalizeAssignmentContentLanguage(requestedLanguage) || preferredQuestionLanguage;
        const versions = getLessonExamVersions(lesson);
        const readVersionTitle = (candidate) => String(candidate?.lessonTitle || '').trim();
        const resolveVersionLanguage = (candidate) => (
          normalizeAssignmentContentLanguage(candidate?.language) || getDefaultContentLanguageForLesson(lesson)
        );
        const resolveVersionTargetAge = (candidate) => {
          const versionAge = String(candidate?.targetAge || '').toLowerCase();
          if (versionAge === 'kids' || versionAge === 'adults' || versionAge === 'all') return versionAge;

          const lessonAge = String(lesson?.targetAge || '').toLowerCase();
          if (lessonAge === 'kids' || lessonAge === 'adults' || lessonAge === 'all') return lessonAge;

          return 'all';
        };

        if (version) {
          const selectedTitle = readVersionTitle(version);
          if (selectedTitle && resolveVersionLanguage(version) === targetLanguage) {
            return selectedTitle;
          }
        }

        const findBy = (predicate) => versions.find((candidate) => (
          predicate(candidate) && !!readVersionTitle(candidate)
        ));

        const byLanguageAll = findBy((candidate) => (
          resolveVersionLanguage(candidate) === targetLanguage
          && resolveVersionTargetAge(candidate) === 'all'
        ));
        if (byLanguageAll) return readVersionTitle(byLanguageAll);

        const byLanguage = findBy((candidate) => resolveVersionLanguage(candidate) === targetLanguage);
        if (byLanguage) return readVersionTitle(byLanguage);

        return '';
      };

      const getRoadmapLessonTitle = (lesson, version) => {
        const rawTitle = String(lesson?.title || '').trim();
        const localizedVersionTitle = getVersionLocalizedLessonTitle(lesson, version, preferredQuestionLanguage);

        if (preferredQuestionLanguage !== 'en') {
          return localizedVersionTitle || rawTitle || t.lessonWithoutTitle;
        }

        if (localizedVersionTitle && localizedVersionTitle !== '-') {
          return localizedVersionTitle;
        }

        const explicitEnglishTitle = pickLocalizedText([
          lesson?.titleEn,
          lesson?.title_en,
          lesson?.englishTitle,
          lesson?.nameEn,
          lesson?.name_en,
        ], 'en');

        if (explicitEnglishTitle && explicitEnglishTitle !== '-') {
          return explicitEnglishTitle;
        }

        const lessonId = String(lesson?.id || '').trim();
        const normalizedRawTitle = normalizeForMatch(rawTitle);

        const refById = SMART_TAJWEED_REFERENCE.find((item) => String(item?.id || '').trim() === lessonId);
        if (refById?.en) return refById.en;

        const refByTitle = SMART_TAJWEED_REFERENCE.find((item) => {
          const normalizedAr = normalizeForMatch(item?.ar || '');
          const normalizedEn = normalizeForMatch(item?.en || '');
          if (!normalizedRawTitle) return false;

          return (
            (normalizedAr && (normalizedRawTitle === normalizedAr || normalizedRawTitle.includes(normalizedAr) || normalizedAr.includes(normalizedRawTitle)))
            || (normalizedEn && (normalizedRawTitle === normalizedEn || normalizedRawTitle.includes(normalizedEn) || normalizedEn.includes(normalizedRawTitle)))
          );
        });

        if (refByTitle?.en) return refByTitle.en;

        return rawTitle || t.lessonWithoutTitle;
      };

      const getQuestionKey = (question, index) => {
        const questionId = String(question?.id || '').trim() || 'noid';
        return `q_${index}_${questionId}`;
      };

      const clearQuizValidationForQuestion = (questionKey) => {
        setQuizValidationErrors((prev) => {
          if (!prev[questionKey]) return prev;
          const next = { ...prev };
          delete next[questionKey];
          return next;
        });
      };

      const resetQuizDraftState = () => {
        setQuizDraftAnswers({});
        setQuizValidationErrors({});
        setQuizStatusMessage('');
        setIsQuizSubmitting(false);
        setRecordingQuestionKey(null);
      };

      const upsertQuizDraftAnswer = (questionKey, questionId, updates) => {
        setQuizDraftAnswers((prev) => ({
          ...prev,
          [questionKey]: {
            ...(prev[questionKey] || {}),
            questionId,
            ...updates,
          }
        }));
        clearQuizValidationForQuestion(questionKey);
      };

      const closeTajweedQuiz = () => {
        if (mediaRecorderRef.current?.state === 'recording') {
          recordingMetaRef.current = null;
          mediaRecorderRef.current.stop();
        }
        if (streamRef.current) {
          streamRef.current.getTracks().forEach((track) => track.stop());
          streamRef.current = null;
        }
        mediaRecorderRef.current = null;
        recordingMetaRef.current = null;
        chunksRef.current = [];
        resetQuizDraftState();
        setRoadmapAutoStartCountdown(0);
        setRoadmapAutoStartEnabled(false);
        setExpandedRoadmapLessonId('');
        setShowTajweedRoadmapPage(false);
        setSelectedTajweedQuiz(null);
      };

      const stopQuizRecording = () => {
        if (mediaRecorderRef.current?.state === 'recording') {
          mediaRecorderRef.current.stop();
        }
      };

      const startQuizRecording = async (questionKey, questionId) => {
        setQuizStatusMessage('');

        if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
          setQuizStatusMessage(t.recordingNotSupported);
          return;
        }

        if (recordingQuestionKey && recordingQuestionKey !== questionKey) {
          setQuizStatusMessage(t.recordingAlreadyRunning);
          return;
        }

        try {
          const preferredAudioConstraints = {
            audio: {
              channelCount: 1,
              sampleRate: 48000,
              sampleSize: 16,
              echoCancellation: false,
              noiseSuppression: false,
              autoGainControl: false,
            }
          };

          let stream = null;
          try {
            stream = await navigator.mediaDevices.getUserMedia(preferredAudioConstraints);
          } catch {
            // Fallback to default constraints on devices that reject advanced settings.
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          }

          const mimeCandidates = [
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/mp4',
          ];

          const selectedMimeType = (typeof MediaRecorder.isTypeSupported === 'function')
            ? (mimeCandidates.find((candidate) => MediaRecorder.isTypeSupported(candidate)) || '')
            : '';

          const recorderOptions = {
            audioBitsPerSecond: 128000,
            ...(selectedMimeType ? { mimeType: selectedMimeType } : {}),
          };

          const recorder = new MediaRecorder(stream, recorderOptions);
          const finalMimeType = recorder.mimeType || selectedMimeType || 'audio/webm';

          chunksRef.current = [];
          streamRef.current = stream;
          mediaRecorderRef.current = recorder;
          recordingMetaRef.current = { questionKey, questionId };
          setRecordingQuestionKey(questionKey);

          recorder.ondataavailable = (event) => {
            if (event.data?.size > 0) {
              chunksRef.current.push(event.data);
            }
          };

          recorder.onstop = () => {
            const meta = recordingMetaRef.current;
            const chunks = [...chunksRef.current];

            if (streamRef.current) {
              streamRef.current.getTracks().forEach((track) => track.stop());
            }

            mediaRecorderRef.current = null;
            streamRef.current = null;
            chunksRef.current = [];
            recordingMetaRef.current = null;
            setRecordingQuestionKey(null);

            if (!meta || !chunks.length) return;

            const blob = new Blob(chunks, { type: finalMimeType });
            const reader = new FileReader();
            reader.onloadend = () => {
              const dataUrl = typeof reader.result === 'string' ? reader.result : '';
              if (!dataUrl) return;
              upsertQuizDraftAnswer(meta.questionKey, meta.questionId, { audioBase64: dataUrl });
            };
            reader.readAsDataURL(blob);
          };

          recorder.start();
        } catch (err) {
          console.error(err);
          setQuizStatusMessage(t.recordingPermissionDenied);
        }
      };

      const removeQuizAudioDraft = (questionKey, questionId) => {
        upsertQuizDraftAnswer(questionKey, questionId, { audioBase64: undefined });
      };

      const submitTajweedQuiz = async () => {
        if (!selectedTajweedQuiz || selectedTajweedQuiz.missing) return;

        if (!selectedTajweedQuiz.assignmentId || isTourMode) {
          setQuizStatusMessage(t.quizPreviewOnly);
          return;
        }

        const questions = Array.isArray(selectedTajweedQuiz.questions) ? selectedTajweedQuiz.questions : [];
        const nextErrors = {};

        questions.forEach((question, index) => {
          const questionKey = getQuestionKey(question, index);
          const draft = quizDraftAnswers[questionKey] || {};
          const questionType = normalizeQuestionType(question);

          if (questionType === 'multiple_choice') {
            if (typeof draft.selectedOptionIndex !== 'number') {
              nextErrors[questionKey] = true;
            }
            return;
          }

          if (questionType === 'audio') {
            if (!draft.audioBase64) {
              nextErrors[questionKey] = true;
            }
            return;
          }

          if (!String(draft.answerText || '').trim()) {
            nextErrors[questionKey] = true;
          }
        });

        if (Object.keys(nextErrors).length > 0) {
          setQuizValidationErrors(nextErrors);
          setQuizStatusMessage(t.allQuestionsRequired);
          return;
        }

        setQuizValidationErrors({});
        setQuizStatusMessage('');
        setIsQuizSubmitting(true);

        const submissionId = `${selectedTajweedQuiz.assignmentId}_sub_${Date.now()}`;
        const answers = questions.map((question, index) => {
          const questionKey = getQuestionKey(question, index);
          const draft = quizDraftAnswers[questionKey] || {};
          return {
            questionId: question?.id || questionKey,
            questionKey,
            questionOrder: index,
            answerText: draft.answerText,
            selectedOptionIndex: draft.selectedOptionIndex,
            audioBase64: draft.audioBase64,
          };
        });

        const submission = {
          id: submissionId,
          assignmentId: selectedTajweedQuiz.assignmentId,
          studentId: student.id,
          submittedAt: Date.now(),
          answers,
        };

        try {
          await axios.put(`${API_BASE}/appState/tajweedSubmissions/${encodeURIComponent(submissionId)}.json`, submission);
          await axios.patch(`${API_BASE}/appState/tajweedAssignments/${encodeURIComponent(selectedTajweedQuiz.assignmentId)}.json`, {
            status: 'submitted',
            submissionId,
          });

          setData((prev) => {
            if (!prev) return prev;
            return {
              ...prev,
              tajweedSubmissions: {
                ...(prev.tajweedSubmissions || {}),
                [submissionId]: submission,
              },
              tajweedAssignments: {
                ...(prev.tajweedAssignments || {}),
                [selectedTajweedQuiz.assignmentId]: {
                  ...(prev.tajweedAssignments?.[selectedTajweedQuiz.assignmentId] || {}),
                  status: 'submitted',
                  submissionId,
                }
              }
            };
          });

          setQuizStatusMessage(t.submitSuccess);

          setTimeout(() => {
            closeTajweedQuiz();
          }, 700);
        } catch (err) {
          console.error(err);
          setQuizStatusMessage(t.submitFailed);
        } finally {
          setIsQuizSubmitting(false);
        }
      };

      const openTajweedQuiz = (payload) => {
        if (mediaRecorderRef.current?.state === 'recording') {
          mediaRecorderRef.current.stop();
        }
        if (streamRef.current) {
          streamRef.current.getTracks().forEach((track) => track.stop());
          streamRef.current = null;
        }
        mediaRecorderRef.current = null;
        recordingMetaRef.current = null;
        chunksRef.current = [];
        resetQuizDraftState();
        setRoadmapAutoStartCountdown(0);
        setRoadmapAutoStartEnabled(!payload?.missing);
        setExpandedRoadmapLessonId('');
        setShowTajweedRoadmapPage(!payload?.missing);
        setSelectedTajweedQuiz(payload);
      };

      const openLearningRoadmapPage = () => {
        if (!selectedTajweedQuiz || selectedTajweedQuiz.missing) return;
        setRoadmapAutoStartEnabled(false);
        setRoadmapAutoStartCountdown(0);
        setExpandedRoadmapLessonId('');
        setShowTajweedRoadmapPage(true);
      };

      const openCurrentQuizFromRoadmap = () => {
        if (!selectedTajweedQuiz || selectedTajweedQuiz.missing) return;
        setRoadmapAutoStartEnabled(false);
        setRoadmapAutoStartCountdown(0);
        setShowTajweedRoadmapPage(false);
      };

      const openTajweedQuizFromSection = (section) => {
        const assignment = findMatchingPendingTajweedAssignment(section);

        if (!assignment) {
          const sectionResolved = resolveBankLessonFromSection(section);
          if (!sectionResolved) {
            openTajweedQuiz({ missing: true });
            return;
          }

          const previewContentLanguage = getDefaultContentLanguageForLesson(sectionResolved.lesson);
          const previewVersion = getAssignmentExamVersion(sectionResolved.lesson, { contentLanguage: previewContentLanguage });
          const previewQuestions = Array.isArray(previewVersion?.questions)
            ? previewVersion.questions
            : (Array.isArray(sectionResolved.lesson?.questions) ? sectionResolved.lesson.questions : []);
          const previewLessonTitle = getRoadmapLessonTitle(sectionResolved.lesson, previewVersion);

          openTajweedQuiz({
            assignmentId: null,
            lessonId: sectionResolved.lessonId,
            lessonTitle: previewLessonTitle || sectionResolved.lesson?.title || section?.content || t.tajweedSection,
            contentLanguage: normalizeAssignmentContentLanguage(previewVersion?.language) || previewContentLanguage,
            versionId: previewVersion?.id,
            lessonLanguage: getLessonLanguage(sectionResolved.lesson),
            assignedAt: undefined,
            questions: previewQuestions
          });
          return;
        }

        const lesson = assignment.resolvedLesson;
        const quizContentLanguage = normalizeAssignmentContentLanguage(assignment?.contentLanguage)
          || normalizeAssignmentContentLanguage(assignment?.resolvedVersionLanguage)
          || getDefaultContentLanguageForLesson(lesson);
        const assignmentQuestions = Array.isArray(assignment?.resolvedQuestions)
          ? assignment.resolvedQuestions
          : (Array.isArray(lesson?.questions) ? lesson.questions : []);
        const resolvedVersion = assignment?.resolvedVersion || getAssignmentExamVersion(lesson, assignment);
        const resolvedLessonTitle = getRoadmapLessonTitle(lesson, resolvedVersion);

        openTajweedQuiz({
          assignmentId: assignment?.id,
          lessonId: assignment?.resolvedLessonId,
          lessonTitle: resolvedLessonTitle || lesson?.title || section?.content || t.tajweedSection,
          contentLanguage: quizContentLanguage,
          versionId: assignment?.resolvedVersionId || assignment?.versionId,
          lessonLanguage: getLessonLanguage(lesson),
          assignedAt: assignment?.assignedAt,
          questions: assignmentQuestions
        });
      };

      // Calendar Calculations
      const daysInMonth = new Date(effectiveYear, effectiveMonth + 1, 0).getDate();
      const firstDayIndex = new Date(effectiveYear, effectiveMonth, 1).getDay();

      const paddingDays = Array.from({ length: firstDayIndex }).map((_, i) => null);
      const monthDays = Array.from({ length: daysInMonth }).map((_, i) => i + 1);

      // Calculate Stats
      let presentCount = 0;
      let absentCount = 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const daysInMonthCounter = new Date(effectiveYear, effectiveMonth + 1, 0).getDate();
      for (let d = 1; d <= daysInMonthCounter; d++) {
        const dateObj = new Date(effectiveYear, effectiveMonth, d);
        const dayOfWeek = dateObj.getDay();
        const isSched = student.days?.includes(dayOfWeek);
        const attendanceKey = `${student.id}_${d}_${effectiveMonth}_${effectiveYear}`;
        const st = attendance?.[attendanceKey];

        if ([STATUS.PRESENT, STATUS.DOUBLE_CLASS, STATUS.EXTRA_DOUBLE].includes(st)) {
          presentCount++;
          if (st === STATUS.DOUBLE_CLASS || st === STATUS.EXTRA_DOUBLE) presentCount++;
        } else if ([STATUS.UNEXCUSED_ABSENCE, STATUS.ABSENCE_RED, STATUS.PAID_ABSENCE].includes(st)) {
          absentCount++;
        }
      }

      const closeReport = () => setSelectedReport(null);

      // Render Calendar Day
      const renderDay = (day) => {
        if (!day) return <div key={Math.random()} className="aspect-square opacity-0"></div>;

        const dateObj = new Date(effectiveYear, effectiveMonth, day);
        const dayOfWeek = dateObj.getDay();

        const isScheduled = student.days?.includes(dayOfWeek);
        const attendanceKey = `${student.id}_${day}_${effectiveMonth}_${effectiveYear}`;
        const status = attendance?.[attendanceKey];
        const rawReport = savedReports?.[attendanceKey];
        // If the status was deleted/cleared via Undo, hide the report icon even if report text remains in Firebase
        const reportText = status ? (typeof rawReport === 'string' ? rawReport : rawReport?.reportText || null) : null;

        let bgColor = "bg-white/5";
        let borderColor = "border-white/10";
        let statusIndicator = null;
        let opacityClass = "opacity-100";
        let isAbsent = false;
        let isCompensated = false;

        // Present statuses
        if ([STATUS.PRESENT, STATUS.DOUBLE_CLASS, STATUS.EXTRA_DOUBLE].includes(status)) {
          bgColor = "bg-emerald-500/20";
          borderColor = "border-emerald-500/50";
          statusIndicator = <div className="absolute top-1 right-1 md:top-2 md:right-2 w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div>;
        }
        // Compensated Absences (Scroll clicks)
        else if ([STATUS.UNEXCUSED_ABSENCE, STATUS.ABSENCE_RED].includes(status)) {
          isCompensated = true;
          isAbsent = true;
        }
        // Regular Paid Absence (Right click)
        else if (status === STATUS.PAID_ABSENCE) {
          isAbsent = true;
        }

        if (isCompensated) {
          bgColor = "bg-amber-500/10";
          borderColor = "border-amber-500/40";
          statusIndicator = <div className="absolute top-1 right-1 md:top-2 md:right-2 w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.8)]" title="Compensated Class"></div>;
        } else if (isAbsent) {
          bgColor = "bg-red-500/10";
          borderColor = "border-red-500/30";
          statusIndicator = <div className="absolute top-1 right-1 md:top-2 md:right-2 w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-red-400 shadow-[0_0_8px_rgba(248,113,113,0.8)]"></div>;
        } else if (!status && !isScheduled) {
          bgColor = "bg-transparent";
          borderColor = "border-transparent";
          opacityClass = "opacity-25 blur-[0.5px]"; // Dim days without classes
        } else if (!isAbsent && ((isScheduled && !status) || status === STATUS.POSTPONED || status === STATUS.EXTRA_DAY)) {
          borderColor = "border-islamic-gold/40 border-dashed";
        }

        return (
          <div
            id={isTourMode && [2, 4, 9].includes(day) ? `tour-day-${day}` : undefined}
            key={day}
            className={`relative flex flex-col items-center justify-center p-2 rounded-xl border ${bgColor} ${borderColor} ${opacityClass} transition-all duration-300 hover:border-islamic-gold/70 group aspect-square ${glowReportDay === day ? 'animate-report-glow' : ''}`}
          >
            {statusIndicator}
            <span className={`text-lg font-semibold ${isScheduled ? 'text-white' : 'text-slate-400'} ${reportText ? '-translate-y-1 md:translate-y-0' : ''}`}>
              {toArabicNums(day)}
            </span>

            {reportText && (
              <button
                id={isTourMode && day === 2 ? 'tour-report-btn' : undefined}
                onClick={() => {
                  setSelectedReport({ day, text: reportText });
                  if (isTourMode && day === 2 && window.driverObjInstance) {
                    setTimeout(() => window.driverObjInstance.moveNext(), 150);
                  }
                }}
                className="absolute bottom-1 left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:-mb-1 w-4 h-4 md:w-8 md:h-8 rounded-full bg-islamic-gold/20 text-islamic-gold hover:bg-islamic-gold hover:text-islamic-900 flex items-center justify-center transition-all duration-300 transform group-hover:scale-110 shadow-lg z-10"
                title="View Report"
              >
                <i data-lucide="file-text" className="w-2.5 h-2.5 md:w-4 md:h-4"></i>
              </button>
            )}
          </div>
        );
      };

      const renderSectionGroup = (sections, typeLabelClass, sideBorderClass, typeName, tourId, options = {}) => {
        if (sections.length === 0) return null;
        return (
          <div id={tourId} className="mb-6">
